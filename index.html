<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مفاجأة لجميلي ✨</title>
    <style>
        body { 
            background: #050505;
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            font-family: 'Cairo', sans-serif;
            overflow: hidden;
            color: white;
        }

        /* خلفية النجوم المتحركة */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 0;
        }

        #instruction {
            color: #fff;
            font-size: 20px;
            margin-bottom: 40px;
            letter-spacing: 1px;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.5);
            animation: pulseText 2s infinite ease-in-out;
            z-index: 10;
            pointer-events: none;
        }

        @keyframes pulseText {
            0%, 100% { opacity: 0.4; transform: scale(0.95); }
            50% { opacity: 1; transform: scale(1.05); }
        }

        .container {
            position: relative;
            width: 280px; 
            height: 280px;
            cursor: pointer;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: transform 0.3s;
        }

        .container:active { transform: scale(0.9); }

        /* النص داخل القلب */
        .text {
            position: absolute;
            color: white;
            font-weight: bold;
            font-size: 24px;
            text-align: center;
            opacity: 0;
            z-index: 11;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
            line-height: 1.5;
        }

        svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 0 20px rgba(255, 50, 50, 0.3));
        }

        .heart-path {
            fill: none;
            stroke: #ff3232;
            stroke-width: 2.5;
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            stroke-linecap: round;
        }

        /* أنميشن السحر */
        .container.active .heart-path {
            animation: drawHeart 3s forwards ease-in-out, pulseHeart 1.4s 3s infinite ease-in-out;
        }

        .container.active .text {
            animation: fadeIn 1.5s forwards 2.5s;
        }

        @keyframes drawHeart {
            0% { stroke-dashoffset: 1000; fill: rgba(255, 50, 50, 0); }
            100% { stroke-dashoffset: 0; fill: rgba(255, 50, 50, 0.5); }
        }

        @keyframes pulseHeart {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 20px #ff0000); }
            50% { transform: scale(1.08); filter: drop-shadow(0 0 40px #ff3232); }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* طبقة التوهج الخلفي */
        .glow {
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(255,50,50,0.2) 0%, transparent 70%);
            opacity: 0;
            transition: opacity 2s;
        }
        .container.active .glow { opacity: 1; }
    </style>
</head>
<body>

    <canvas id="canvas"></canvas>
    <div id="instruction">المس الشاشة ياجميلي.. ✨</div>

    <div class="container" onclick="startAnimation()">
        <div class="glow"></div>
        <svg viewBox="0 0 100 100">
            <path class="heart-path" d="M50,88 C50,88 10,57 10,32 C10,13 32,10 50,30 C68,10 90,13 90,32 C90,57 50,88 50,88 Z"></path>
        </svg>
        <div class="text">أنتَ عمري<br>وكل أشيائي الجميلة ❤️</div>
    </div>

    <script>
        // أنميشن النجوم المتفاعل
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let stars = [];

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        class Star {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2;
                this.speedX = (Math.random() - 0.5) * 0.5;
                this.speedY = (Math.random() - 0.5) * 0.5;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.x > canvas.width) this.x = 0;
                if (this.x < 0) this.x = canvas.width;
                if (this.y > canvas.height) this.y = 0;
                if (this.y < 0) this.y = canvas.height;
            }
            draw() {
                ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        for (let i = 0; i < 150; i++) stars.push(new Star());

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            stars.forEach(star => {
                star.update();
                star.draw();
            });
            requestAnimationFrame(animate);
        }
        animate();

        function startAnimation() {
            document.getElementById('instruction').style.opacity = '0';
            const container = document.querySelector('.container');
            if (!container.classList.contains('active')) {
                container.classList.add('active');
                setTimeout(() => {
                    window.location.href = 'https://t.me/mnshtrk';
                }, 7500); // زدنا الوقت قليلاً للاستمتاع بالمنظر
            }
        }
    </script>
</body>
</html>
