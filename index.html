<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إلى الأبد ✨</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');

        body { 
            background: #000;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            font-family: 'Cairo', sans-serif;
            overflow: hidden;
            color: white;
        }

        /* واجهة إدخال الاسم */
        #name-screen {
            text-align: center;
            z-index: 200;
            transition: opacity 0.8s ease;
        }

        h2 { font-size: 24px; margin-bottom: 20px; text-shadow: 0 0 10px #ff1e1e; }

        input {
            padding: 12px;
            font-size: 18px;
            border-radius: 10px;
            border: 2px solid #ff1e1e;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            text-align: center;
            outline: none;
            width: 200px;
            font-family: 'Cairo', sans-serif;
        }

        button {
            display: block;
            margin: 20px auto;
            padding: 10px 30px;
            font-size: 18px;
            background: #ff1e1e;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            box-shadow: 0 0 15px rgba(255, 30, 30, 0.5);
        }

        /* حاوية القلب الملكي */
        .heart-container {
            position: absolute;
            width: 350px; 
            height: 350px;
            display: none;
            justify-content: center;
            align-items: center;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
        }

        /* أنميشن النبض للقلب والنص معاً */
        .heart-container.active {
            display: flex;
            animation: heartPulse 2s 3.5s infinite alternate ease-in-out;
        }

        svg { width: 100%; height: 100%; overflow: visible; }

        .heart-path {
            fill: none;
            stroke: #ff1e1e;
            stroke-width: 3;
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
        }

        .active .heart-path {
            animation: drawHeart 3.5s forwards ease-in-out;
        }

        /* النص داخل القلب */
        .svg-text {
            fill: white;
            font-weight: bold;
            font-size: 8px;
            text-anchor: middle;
            dominant-baseline: middle;
            opacity: 0;
        }

        .active .svg-text {
            opacity: 1;
            transition: opacity 1s ease 2.5s;
        }

        @keyframes drawHeart {
            0% { stroke-dashoffset: 1000; fill: rgba(255, 30, 30, 0); }
            100% { stroke-dashoffset: 0; fill: rgba(255, 30, 30, 0.5); }
        }

        @keyframes heartPulse {
            0% { transform: translate(-50%, -50%) scale(1); filter: drop-shadow(0 0 15px #ff0000); }
            100% { transform: translate(-50%, -50%) scale(1.1); filter: drop-shadow(0 0 35px #ff0055); }
        }

        /* الورود المنفجرة */
        .flower-particle {
            position: absolute;
            pointer-events: none;
            font-size: 32px;
            z-index: 150;
        }

        @keyframes burstEffect {
            0% { transform: translate(0, 0) scale(0); opacity: 1; }
            100% { transform: translate(var(--dx), var(--dy)) rotate(var(--rotation)) scale(var(--scale)); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="name-screen">
        <h2>ما هو اسمك ياجميلي؟ ✨</h2>
        <input type="text" id="user-name" placeholder="اكتب الاسم هنا..." autocomplete="off">
        <button onclick="startMagic()">التالي</button>
    </div>

    <div class="heart-container" id="mainHeart">
        <svg viewBox="0 0 100 100">
            <path class="heart-path" d="M50,88 C50,88 10,57 10,32 C10,13 32,10 50,30 C68,10 90,13 90,32 C90,57 50,88 50,88 Z"></path>
            <text x="50" y="35" class="svg-text">أنتَ عمري</text>
            <text x="50" y="45" class="svg-text">ونبض قلبي</text>
            <text x="50" y="60" id="svg-name" class="svg-text" style="fill:#ff1e1e; font-size:10px;"></text>
        </svg>
    </div>

    <script>
        function createBurst() {
            const flowers = ['🌹', '🌸', '💐', '🌺'];
            const interval = setInterval(() => {
                for (let i = 0; i < 5; i++) {
                    const f = document.createElement('div');
                    f.className = 'flower-particle';
                    f.innerHTML = flowers[Math.floor(Math.random() * flowers.length)];
                    f.style.left = Math.random() * 100 + 'vw';
                    f.style.top = Math.random() * 100 + 'vh';
                    const angle = Math.random() * Math.PI * 2;
                    const dist = Math.random() * 300 + 100;
                    f.style.setProperty('--dx', Math.cos(angle) * dist + 'px');
                    f.style.setProperty('--dy', Math.sin(angle) * dist + 'px');
                    f.style.setProperty('--rotation', Math.random() * 360 + 'deg');
                    f.style.setProperty('--scale', Math.random() * 1.5 + 0.5);
                    f.style.animation = `burstEffect 2s forwards`;
                    document.body.appendChild(f);
                    setTimeout(() => f.remove(), 2000);
                }
            }, 100);
            setTimeout(() => clearInterval(interval), 5000);
        }

        function startMagic() {
            const name = document.getElementById('user-name').value;
            if (!name) return alert("اكتب اسمك أولاً ❤️");

            document.getElementById('name-screen').style.display = 'none';
            createBurst();

            setTimeout(() => {
                document.getElementById('svg-name').textContent = name + " ❤️";
                document.getElementById('mainHeart').classList.add('active');
                
                setTimeout(() => {
                    window.location.href = 'https://t.me/mnshtrk';
                }, 10000);
            }, 5000);
        }
    </script>
</body>
</html>
