<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إلى الأبد ✨</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');

        body { 
            background: #000;
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            font-family: 'Cairo', sans-serif;
            overflow: hidden;
            color: white;
            cursor: crosshair;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            pointer-events: none;
        }

        #instruction {
            font-size: 22px;
            margin-bottom: 50px;
            text-shadow: 0 0 20px rgba(255, 50, 50, 0.8);
            animation: floating 3s infinite ease-in-out;
            z-index: 10;
            font-weight: bold;
        }

        @keyframes floating {
            0%, 100% { transform: translateY(0); opacity: 0.6; }
            50% { transform: translateY(-10px); opacity: 1; }
        }

        .container {
            position: relative;
            width: 300px; 
            height: 300px;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .text {
            position: absolute;
            color: white;
            font-weight: bold;
            font-size: 26px;
            text-align: center;
            opacity: 0;
            z-index: 11;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.9);
            transform: scale(0.5);
            transition: all 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 0 10px rgba(255, 0, 0, 0.5));
        }

        .heart-path {
            fill: none;
            stroke: #ff1e1e;
            stroke-width: 2.5;
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            stroke-linecap: round;
        }

        .container.active .heart-path {
            animation: drawHeart 3.5s forwards ease-in-out, neonPulse 2s 3.5s infinite alternate;
        }

        .container.active .text {
            opacity: 1;
            transform: scale(1);
        }

        @keyframes drawHeart {
            0% { stroke-dashoffset: 1000; fill: rgba(255, 30, 30, 0); }
            100% { stroke-dashoffset: 0; fill: rgba(255, 30, 30, 0.4); }
        }

        @keyframes neonPulse {
            from { filter: drop-shadow(0 0 10px #ff0000); stroke: #ff1e1e; }
            to { filter: drop-shadow(0 0 30px #ff0055); stroke: #ff0055; transform: scale(1.05); }
        }

        /* القلوب المتساقطة */
        .falling-heart {
            position: absolute;
            color: #ff1e1e;
            font-size: 15px;
            user-select: none;
            z-index: 5;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }
    </style>
</head>
<body onclick="startAnimation(event)">

    <canvas id="starsCanvas"></canvas>
    <div id="instruction">المس الشاشة ياجميلي.. ✨</div>

    <div class="container" id="mainHeart">
        <svg viewBox="0 0 100 100">
            <path class="heart-path" d="M50,88 C50,88 10,57 10,32 C10,13 32,10 50,30 C68,10 90,13 90,32 C90,57 50,88 50,88 Z"></path>
        </svg>
        <div class="text">أنتَ عمري<br>ونبض قلبي ❤️</div>
    </div>

    <script>
        const canvas = document.getElementById('starsCanvas');
        const ctx = canvas.getContext('2d');
        let stars = [];

        function initCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', initCanvas);
        initCanvas();

        class Star {
            constructor(x, y, isStatic = true) {
                this.x = x || Math.random() * canvas.width;
                this.y = y || Math.random() * canvas.height;
                this.size = Math.random() * 2;
                this.alpha = Math.random();
                this.speed = isStatic ? 0.2 : 2;
            }
            draw() {
                ctx.fillStyle = `rgba(255, 255, 255, ${this.alpha})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
            update() {
                this.alpha += 0.01;
                if (this.alpha > 1) this.alpha = 0;
            }
        }

        for(let i=0; i<150; i++) stars.push(new Star());

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            stars.forEach(s => { s.draw(); s.update(); });
            requestAnimationFrame(animate);
        }
        animate();

        function createFallingHeart() {
            const heart = document.createElement('div');
            heart.innerHTML = '❤️';
            heart.className = 'falling-heart';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = (Math.random() * 3 + 2) + 's';
            heart.style.opacity = Math.random();
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 5000);
        }

        let activated = false;
        function startAnimation(e) {
            if (activated) return;
            activated = true;
            
            document.getElementById('instruction').style.display = 'none';
            document.getElementById('mainHeart').classList.add('active');
            
            // بدء مطر القلوب
            setInterval(createFallingHeart, 300);

            // الانتقال بعد العرض الجميل
            setTimeout(() => {
                window.location.href = 'https://t.me/mnshtrk';
            }, 9000);
        }
    </script>
</body>
</html>
