<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إلى الأبد ✨</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');

        body { 
            background: #000;
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            font-family: 'Cairo', sans-serif;
            overflow: hidden;
            color: white;
            cursor: pointer; /* تغيير المؤشر ليدل على إمكانية الضغط */
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
            pointer-events: none;
        }

        #instruction {
            font-size: 24px;
            margin-bottom: 50px;
            text-shadow: 0 0 20px rgba(255, 50, 50, 0.8);
            animation: floating 3s infinite ease-in-out;
            z-index: 10;
            font-weight: bold;
            text-align: center;
        }

        @keyframes floating {
            0%, 100% { transform: translateY(0); opacity: 0.7; }
            50% { transform: translateY(-15px); opacity: 1; }
        }

        .container {
            position: relative;
            width: 300px; 
            height: 300px;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none; /* منع الحاوية من اعتراض الضغط */
        }

        .text {
            position: absolute;
            color: white;
            font-weight: bold;
            font-size: 28px;
            text-align: center;
            opacity: 0;
            z-index: 11;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.9);
            transform: scale(0.5);
            transition: all 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 0 15px rgba(255, 0, 0, 0.6));
        }

        .heart-path {
            fill: none;
            stroke: #ff1e1e;
            stroke-width: 3;
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            stroke-linecap: round;
        }

        .container.active .heart-path {
            animation: drawHeart 3.5s forwards ease-in-out, neonPulse 2s 3.5s infinite alternate;
        }

        .container.active .text {
            opacity: 1;
            transform: scale(1);
        }

        @keyframes drawHeart {
            0% { stroke-dashoffset: 1000; fill: rgba(255, 30, 30, 0); }
            100% { stroke-dashoffset: 0; fill: rgba(255, 30, 30, 0.5); }
        }

        @keyframes neonPulse {
            from { filter: drop-shadow(0 0 15px #ff0000); stroke: #ff1e1e; }
            to { filter: drop-shadow(0 0 35px #ff0055); stroke: #ff0055; transform: scale(1.03); }
        }

        /* القلوب المتساقطة */
        .falling-heart {
            position: absolute;
            color: #ff1e1e;
            font-size: 18px;
            user-select: none;
            z-index: 5;
            animation: fall linear forwards;
        }

        @keyframes fall {
            to { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }

        /* جسيمات انفجار الورد */
        .flower-particle {
            position: absolute;
            pointer-events: none;
            font-size: 25px; /* تكبير حجم الورود قليلاً */
            z-index: 15;
            animation: burstAnimation linear forwards;
        }

        @keyframes burstAnimation {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--dx), var(--dy)) rotate(var(--rotation)) scale(var(--scale)); opacity: 0; }
        }
    </style>
</head>
<body onclick="startEverything(event)">

    <canvas id="starsCanvas"></canvas>
    <div id="instruction">المس الشاشة ياجميلي.. ✨</div>

    <div class="container" id="mainHeart">
        <svg viewBox="0 0 100 100">
            <path class="heart-path" d="M50,88 C50,88 10,57 10,32 C10,13 32,10 50,30 C68,10 90,13 90,32 C90,57 50,88 50,88 Z"></path>
        </svg>
        <div class="text">أنتَ عمري<br>ونبض قلبي ❤️</div>
    </div>

    <script>
        // --- إعداد النجوم ---
        const canvas = document.getElementById('starsCanvas');
        const ctx = canvas.getContext('2d');
        let stars = [];

        function initCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            stars = [];
            for(let i=0; i<150; i++) stars.push(new Star());
        }
        window.addEventListener('resize', initCanvas);

        class Star {
            constructor() {
                this.x = Math.random() * window.innerWidth;
                this.y = Math.random() * window.innerHeight;
                this.size = Math.random() * 2;
                this.alpha = Math.random();
                this.fadeSpeed = Math.random() * 0.02 + 0.005;
            }
            draw() {
                ctx.fillStyle = `rgba(255, 255, 255, ${this.alpha})`;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
            update() {
                this.alpha += this.fadeSpeed;
                if (this.alpha > 1 || this.alpha < 0) this.fadeSpeed = -this.fadeSpeed;
            }
        }

        initCanvas(); // التشغيل الأولي

        function animateStars() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            stars.forEach(s => { s.draw(); s.update(); });
            requestAnimationFrame(animateStars);
        }
        animateStars();

        // --- وظائف المؤثرات الخاصة ---

        // 1. إنشاء انفجار الورد
        function createRoseBurst(startX, startY) {
            const flowers = ['🌹', '🌸', '💐', '🌺'];
            const burstCount = 80; // عدد الورود في الانفجار

            for (let i = 0; i < burstCount; i++) {
                const flower = document.createElement('div');
                flower.className = 'flower-particle';
                flower.innerHTML = flowers[Math.floor(Math.random() * flowers.length)];
                
                // حساب اتجاه عشوائي بقوة مختلفة
                const angle = Math.random() * Math.PI * 2;
                const force = Math.random() * 400 + 100; // قوة الانفجار
                const dx = Math.cos(angle) * force;
                const dy = Math.sin(angle) * force;

                // إعدادات البداية والنهاية للأنميشن
                flower.style.left = startX + 'px';
                flower.style.top = startY + 'px';
                flower.style.setProperty('--dx', dx + 'px');
                flower.style.setProperty('--dy', dy + 'px');
                flower.style.setProperty('--rotation', (Math.random() * 720 - 360) + 'deg');
                flower.style.setProperty('--scale', Math.random() * 1.5 + 0.5);
                
                // مدة عشوائية للأنميشن لتبدو طبيعية أكثر
                flower.style.animationDuration = (Math.random() * 1.5 + 1) + 's';
                flower.style.animationTimingFunction = 'cubic-bezier(0.1, 0.8, 0.3, 1)'; // حركة سريعة ثم تتباطأ
                
                document.body.appendChild(flower);
                // إزالة العنصر بعد انتهاء الأنميشن
                setTimeout(() => flower.remove(), 2500);
            }
        }

        // 2. إنشاء مطر القلوب
        function createFallingHeart() {
            const heart = document.createElement('div');
            heart.innerHTML = '❤️';
            heart.className = 'falling-heart';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.top = '-20px'; // البداية من فوق الشاشة
            heart.style.animationDuration = (Math.random() * 3 + 2) + 's'; // سرعات مختلفة
            heart.style.opacity = Math.random() * 0.7 + 0.3; // شفافية مختلفة
            document.body.appendChild(heart);
            setTimeout(() => heart.remove(), 5000);
        }

        // --- الوظيفة الرئيسية لتشغيل كل شيء ---
        let activated = false;
        function startEverything(e) {
            if (activated) return; // منع التشغيل المتكرر
            activated = true;
            
            // 1. إخفاء نص التعليمات
            document.getElementById('instruction').style.display = 'none';
            
            // 2. تفعيل أنميشن القلب الكبير والنص
            document.getElementById('mainHeart').classList.add('active');
            
            // 3. تشغيل انفجار الورود فوراً من مكان الضغط
            createRoseBurst(e.clientX, e.clientY);
            
            // 4. بدء مطر القلوب المستمر
            setInterval(createFallingHeart, 300);

            // 5. الانتقال للتليجرام بعد انتهاء العرض (10 ثواني)
            setTimeout(() => {
                window.location.href = 'https://t.me/mnshtrk';
            }, 10000);
        }
    </script>
</body>
</html>
