<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>عالمك السحري ✨</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');

        body { 
            background: radial-gradient(circle, #1a0a0a, #000);
            display: flex; justify-content: center; align-items: center; 
            height: 100vh; margin: 0; font-family: 'Cairo', sans-serif;
            overflow: hidden; color: white; touch-action: none;
        }

        /* 1. تأثير النيون المتغير */
        @keyframes neonGlow {
            0% { filter: drop-shadow(0 0 15px #ff1e1e); }
            50% { filter: drop-shadow(0 0 30px #ff0055); }
            100% { filter: drop-shadow(0 0 15px #9c27b0); }
        }

        #name-screen {
            text-align: center; z-index: 200; background: rgba(0, 0, 0, 0.9);
            padding: 40px; border-radius: 30px; border: 1px solid #ff1e1e;
            box-shadow: 0 0 20px rgba(255, 30, 30, 0.4);
            transition: all 1s ease; width: 85%; max-width: 400px;
        }

        input {
            padding: 15px; font-size: 18px; border-radius: 15px;
            border: 2px solid #ff1e1e; background: rgba(255, 255, 255, 0.05);
            color: white; text-align: center; width: 90%; outline: none; margin-bottom: 20px;
        }

        button {
            padding: 12px 50px; background: linear-gradient(45deg, #ff1e1e, #ff0055);
            color: white; border: none; border-radius: 30px; cursor: pointer;
            font-size: 18px; font-weight: bold; box-shadow: 0 5px 15px rgba(255, 30, 30, 0.4);
        }

        .heart-container {
            position: absolute; width: 320px; height: 450px;
            display: none; flex-direction: column; justify-content: center;
            align-items: center; left: 50%; top: 50%;
            transform: translate(-50%, -50%); z-index: 10;
        }

        .heart-container.pulsing { 
            animation: heartPulse 2s infinite alternate ease-in-out, neonGlow 4s infinite; 
        }

        @keyframes heartPulse {
            0% { transform: translate(-50%, -50%) scale(1); }
            100% { transform: translate(-50%, -50%) scale(1.08); }
        }

        /* 2. الجزيئات السحرية */
        .sparkle {
            position: absolute; width: 6px; height: 6px; background: gold;
            border-radius: 50%; pointer-events: none; z-index: 100;
            box-shadow: 0 0 10px gold, 0 0 20px orange;
        }

        .svg-text { font-weight: bold; text-anchor: middle; }

        #timer-box {
            position: absolute; bottom: 30px; font-size: 14px; opacity: 0.7;
            display: none; color: #fff; z-index: 100;
        }

        /* 3. الانفجار الختامي */
        .final-explosion {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; z-index: 1000; display: none; opacity: 0;
        }

        #profile-img {
            width: 110px; height: 110px; border-radius: 50%;
            border: 3px solid #ff1e1e; margin-top: -30px;
            opacity: 0; object-fit: cover; transition: opacity 2s;
            background: #222;
        }
    </style>
</head>
<body>

    <div id="name-screen">
        <h2 id="welcome-msg">مرحباً بك في عالمي ✨</h2>
        <input type="text" id="user-name" placeholder="اكتب اسمك هنا..." autocomplete="off">
        <button onclick="igniteMagic()">اكتشف السحر</button>
    </div>

    <div class="heart-container" id="mainHeart">
        <svg viewBox="0 0 100 100" style="width: 100%; height: 300px;">
            <path id="heartPath" fill="none" stroke="transparent" stroke-width="3" 
                  d="M50,88 C50,88 10,57 10,32 C10,13 32,10 50,30 C68,10 90,13 90,32 C90,57 50,88 50,88 Z"></path>
            <text x="50" y="35" id="random-quote" class="svg-text" style="fill:white; font-size:6px; opacity:0;"></text>
            <text x="50" y="55" id="svg-name" class="svg-text" style="fill:#ff1e1e; font-size:10px;"></text>
        </svg>
        <img src="https://via.placeholder.com/150/ff1e1e/ffffff?text=❤️" id="profile-img">
    </div>

    <div id="timer-box">سيفتح القفل خلال <span id="seconds">15</span> ثانية...</div>
    <div class="final-explosion" id="explosion"></div>

    <audio id="bg-music" src="https://www.soundjay.com/misc/sounds/magic-chime-01.mp3"></audio>

    <script>
        const quotes = [
            "أنت أجمل ما حدث لي اليوم", 
            "نبض قلبي يغني باسمك دائماً", 
            "وجودك يجعل هذا العالم مكاناً أفضل", 
            "سحر عيناك هو سر سعادتي"
        ];
        
        // 4. ميزة اللمس السحري (Interactive Sparkles)
        function handleMove(e) {
            const x = e.pageX || e.touches[0].pageX;
            const y = e.pageY || e.touches[0].pageY;
            createSparkle(x, y);
        }
        window.addEventListener('mousemove', handleMove);
        window.addEventListener('touchmove', handleMove);

        function createSparkle(x, y) {
            const s = document.createElement('div');
            s.className = 'sparkle';
            s.style.left = x + 'px'; 
            s.style.top = y + 'px';
            s.style.background = `hsl(${Math.random() * 360}, 100%, 70%)`;
            document.body.appendChild(s);
            setTimeout(() => s.remove(), 800);
        }

        function igniteMagic() {
            const nameInput = document.getElementById('user-name');
            const name = nameInput.value.trim();
            if (!name) return alert("أدخل اسمك أولاً ❤️");

            // تشغيل الموسيقى
            document.getElementById('bg-music').play().catch(() => {});

            document.getElementById('name-screen').style.opacity = '0';
            
            setTimeout(() => {
                document.getElementById('name-screen').style.display = 'none';
                startFallingItems(); // 5. تأثير الورود المتساقطة
                
                // 6. رسالة عشوائية + الاسم
                document.getElementById('random-quote').textContent = quotes[Math.floor(Math.random() * quotes.length)];
                document.getElementById('svg-name').textContent = name + " ❤️";
                
                document.getElementById('mainHeart').style.display = 'flex';
                drawHeart();
            }, 1000);
        }

        // 7. رسم القلب بالـ SVG (نظام المسار)
        function drawHeart() {
            const path = document.getElementById('heartPath');
            const length = path.getTotalLength();
            path.style.stroke = "#ff1e1e";
            path.style.strokeDasharray = length;
            path.style.strokeDashoffset = length;
            path.style.transition = "stroke-dashoffset 4s ease-in-out";
            
            setTimeout(() => {
                path.style.strokeDashoffset = "0";
                setTimeout(() => {
                    // 8. تفعيل النبض والنيون
                    document.getElementById('mainHeart').classList.add('pulsing');
                    document.getElementById('random-quote').style.opacity = "1";
                    document.getElementById('profile-img').style.opacity = "1";
                    startCountdown();
                }, 4000);
            }, 100);
        }

        // 9. العداد التنازلي المطور
        function startCountdown() {
            const timerBox = document.getElementById('timer-box');
            timerBox.style.display = 'block';
            let time = 15;
            const interval = setInterval(() => {
                time--;
                document.getElementById('seconds').textContent = time;
                if(time <= 0) {
                    clearInterval(interval);
                    triggerFinalExplosion();
                }
            }, 1000);
        }

        // 10. الانفجار الأبيض قبل التحويل (سينمائي)
        function triggerFinalExplosion() {
            const exp = document.getElementById('explosion');
            exp.style.display = 'block';
            exp.style.transition = 'opacity 0.8s';
            setTimeout(() => {
                exp.style.opacity = '1';
                setTimeout(() => {
                    window.location.href = 'https://t.me/mnshtrk';
                }, 800);
            }, 10);
        }

        function startFallingItems() {
            const icons = ['🌸', '✨', '❤️', '🌹', '💖'];
            setInterval(() => {
                const f = document.createElement('div');
                f.style.position = 'absolute';
                f.style.top = '-50px';
                f.style.left = Math.random() * 100 + 'vw';
                f.innerHTML = icons[Math.floor(Math.random() * icons.length)];
                f.style.fontSize = Math.random() * 20 + 20 + 'px';
                f.style.pointerEvents = 'none';
                f.style.zIndex = '5';
                f.style.transition = `transform ${Math.random() * 2 + 3}s linear, opacity 3s`;
                document.body.appendChild(f);
                
                setTimeout(() => {
                    f.style.transform = `translateY(110vh) rotate(${Math.random() * 360}deg)`;
                    f.style.opacity = '0';
                }, 100);
                setTimeout(() => f.remove(), 5000);
            }, 300);
        }
    </script>
</body>
</html>
