<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إلى الأبد ✨</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');

        body { 
            background: radial-gradient(circle at center, #1a0505 0%, #000 100%);
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            font-family: 'Cairo', sans-serif;
            overflow: hidden;
            color: white;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
        }

        /* حاوية بتلات الورد المتساقطة في الخلفية */
        #petal-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        .petal {
            position: absolute;
            color: rgba(255, 77, 77, 0.3); /* ورود شفافة في الخلفية */
            font-size: 15px;
            animation: fall linear infinite;
        }

        @keyframes fall {
            to { transform: translateY(110vh) rotate(360deg); }
        }

        /* نصوص التعليمات والمقدمة */
        .instruction-layer {
            position: absolute;
            z-index: 100;
            text-align: center;
            font-weight: bold;
            pointer-events: none;
            transition: opacity 1s ease, transform 1s ease;
        }

        #welcome-text {
            font-size: 26px;
            opacity: 0;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
            animation: welcomeSequence 6s forwards;
        }

        #tap-instruction {
            font-size: 24px;
            opacity: 0;
            text-shadow: 0 0 20px rgba(255, 50, 50, 0.8);
            transform: translateY(20px);
        }

        /* حاوية القلب الكبير - تم تعديل المركز ليقوم بالنبض بوضوح */
        .heart-container {
            position: absolute;
            width: 320px; 
            height: 320px;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            opacity: 0;
            transition: opacity 1s, transform 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* تفعيل أنميشن النبض المتدرج */
        .heart-container.active {
            opacity: 1;
            transform: translate(-50%, -50%) scale(1);
        }

        svg { width: 100%; height: 100%; overflow: visible; }

        .heart-path {
            fill: none;
            stroke: #ff1e1e;
            stroke-width: 3;
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            stroke-linecap: round;
        }

        /* أنميشن رسم القلب والملء */
        .heart-container.active .heart-path {
            animation: drawHeart 3.5s forwards ease-in-out, chameleonPulse 2s 3.5s infinite alternate ease-in-out;
        }

        /* النص داخل القلب (سيتم تحريكه برمجياً) */
        .text {
            position: absolute;
            color: white;
            font-weight: bold;
            font-size: 26px;
            text-align: center;
            z-index: 11;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.9);
            width: 90%;
            line-height: 1.4;
        }

        /* أنميشنات سحرية */
        @keyframes welcomeSequence {
            0% { opacity: 0; }
            30% { opacity: 1; }
            70% { opacity: 1; }
            100% { opacity: 0; }
        }

        @keyframes drawHeart {
            0% { stroke-dashoffset: 1000; fill: rgba(255, 30, 30, 0); }
            100% { stroke-dashoffset: 0; fill: rgba(255, 30, 30, 0.4); }
        }

        /* أنميشن النبض المتدرج (يتغير لونه ببطء) */
        @keyframes chameleonPulse {
            0% { filter: drop-shadow(0 0 15px #ff0000); stroke: #ff1e1e; }
            50% { filter: drop-shadow(0 0 25px #ff0055); stroke: #ff0055; transform: scale(1.03); }
            100% { filter: drop-shadow(0 0 40px #aa00ff); stroke: #aa00ff; }
        }

        /* جسيمات انفجار الورد الملون */
        .flower-particle {
            position: absolute;
            pointer-events: none;
            font-size: 32px;
            z-index: 150;
            width: 40px; height: 40px;
            text-align: center;
            margin-left: -20px; margin-top: -20px;
        }

        @keyframes burstEffect {
            0% { transform: translate(0, 0) scale(0); opacity: 1; }
            100% { transform: translate(var(--dx), var(--dy)) rotate(var(--rotation)) scale(var(--scale)); opacity: 0; }
        }
    </style>
</head>
<body id="body">

    <canvas id="petal-container"></canvas>

    <div id="instruction-layer" class="instruction-layer">
        <div id="welcome-text">استعد لمفاجأة صغيرة.. ❤️</div>
        <div id="tap-instruction">المس الشاشة ياجميلي.. ✨</div>
    </div>

    <div class="heart-container" id="mainHeart">
        <svg viewBox="0 0 100 100">
            <path class="heart-path" d="M50,88 C50,88 10,57 10,32 C10,13 32,10 50,30 C68,10 90,13 90,32 C90,57 50,88 50,88 Z"></path>
        </svg>
        <div class="text" id="typewriter-text"></div>
    </div>

    <script>
        const body = document.getElementById('body');
        const instructionLayer = document.getElementById('instruction-layer');
        const welcomeText = document.getElementById('welcome-text');
        const tapInstruction = document.getElementById('tap-instruction');
        const mainHeart = document.getElementById('mainHeart');
        const typewriterTextElement = document.getElementById('typewriter-text');
        let activated = false;

        // --- 1. تسلسل العرض الترحيبي ---
        setTimeout(() => {
            if (!activated) { // إذا لم يضغط المستخدم بسرعة
                tapInstruction.style.opacity = '1';
                tapInstruction.style.transform = 'translateY(0)';
                tapInstruction.style.animation = 'floating 3s infinite ease-in-out';
            }
        }, 6500); // يظهر النص الثاني بعد اختفاء الأول

        // --- 2. إعداد شلال بتلات الورد الخلفي ---
        function createBackgroundPetals() {
            const container = document.getElementById('petal-container');
            const petals = ['🌸', '🌹', '✨', '💐'];
            for (let i = 0; i < 50; i++) {
                const petal = document.createElement('div');
                petal.className = 'petal';
                petal.innerHTML = petals[Math.floor(Math.random() * petals.length)];
                petal.style.left = Math.random() * 100 + 'vw';
                petal.style.animationDuration = (Math.random() * 10 + 5) + 's';
                petal.style.opacity = Math.random() * 0.5 + 0.1;
                document.body.appendChild(petal);
            }
        }
        createBackgroundPetals();

        // --- 3. وظيفة انفجار الورد الملون ---
        function createRoseBurst(startX, startY) {
            const flowers = ['🌹', '🌸', '💐', '🌺'];
            const burstCount = 100; // زيادة العدد لمظهر أغنى

            for (let i = 0; i < burstCount; i++) {
                const flower = document.createElement('div');
                flower.className = 'flower-particle';
                flower.innerHTML = flowers[Math.floor(Math.random() * flowers.length)];
                
                const angle = Math.random() * Math.PI * 2;
                const distance = Math.random() * 450 + 100; // قوة الانتشار
                const dx = Math.cos(angle) * distance;
                const dy = Math.sin(angle) * distance;

                flower.style.left = startX + 'px';
                flower.style.top = startY + 'px';
                flower.style.setProperty('--dx', dx + 'px');
                flower.style.setProperty('--dy', dy + 'px');
                flower.style.setProperty('--rotation', (Math.random() * 720 - 360) + 'deg');
                flower.style.setProperty('--scale', Math.random() * 1.5 + 0.5);
                flower.style.animationDuration = (Math.random() * 1.5 + 1) + 's';
                
                body.appendChild(flower);
                setTimeout(() => flower.classList.add('flower-burst'), 10);
                setTimeout(() => flower.remove(), 2500);
            }
        }

        // --- 4. تأثير كتابة النص حرفاً بحرف ---
        const finalMessage = "أنتَ عمري\nونبض قلبي ❤️";
        let messageIndex = 0;
        function typeWriter() {
            if (messageIndex < finalMessage.length) {
                typewriterTextElement.innerHTML += finalMessage.charAt(messageIndex) === "\n" ? "<br>" : finalMessage.charAt(messageIndex);
                messageIndex++;
                setTimeout(typeWriter, 120); // سرعة الكتابة
            }
        }

        // --- 5. التشغيل الملحمي ---
        function startEverything(x, y) {
            if (activated) return;
            activated = true;
            
            instructionLayer.style.opacity = '0'; // إخفاء التعليمات
            setTimeout(() => instructionLayer.style.display = 'none', 1000);
            
            mainHeart.classList.add('active'); // تفعيل القلب
            createRoseBurst(x, y); // انفجار الورود
            
            // بدء تأثير الكتابة بعد اكتمال رسم القلب تقريباً
            setTimeout(typeWriter, 4000);

            // الانتقال للتليجرام بعد انتهاء العرض (11 ثانية)
            setTimeout(() => {
                window.location.href = 'https://t.me/mnshtrk';
            }, 11000);
        }

        body.addEventListener('touchstart', (e)=>{const touch=e.touches[0]; startEverything(touch.clientX, touch.clientY);}, {passive:false});
        body.addEventListener('mousedown', (e)=>{startEverything(e.clientX, e.clientY);});
    </script>
</body>
</html>
