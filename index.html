<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>الإمبراطورية السحرية ✨</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');

        :root {
            --primary-color: #ff1e1e;
            --secondary-color: #ff0055;
            --neon-shadow: 0 0 20px rgba(255, 30, 30, 0.5);
        }

        body { 
            background: #000; color: white; font-family: 'Cairo', sans-serif;
            margin: 0; height: 100vh; overflow: hidden; display: flex; 
            justify-content: center; align-items: center; touch-action: none;
        }

        /* تأثير الجسيمات في الخلفية */
        #bg-canvas { position: fixed; top: 0; left: 0; z-index: 1; }

        /* تصميم الزجاج (Glassmorphism) */
        .glass-card {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px; padding: 35px; text-align: center;
            width: 85%; max-width: 400px; z-index: 100;
            box-shadow: 0 25px 50px rgba(0,0,0,0.8);
            transition: all 1s cubic-bezier(0.4, 0, 0.2, 1);
        }

        h2, h3 { margin-top: 0; color: #fff; text-shadow: var(--neon-shadow); }

        input {
            width: 90%; padding: 14px; margin: 12px 0; border-radius: 15px;
            border: 1px solid #333; background: rgba(0,0,0,0.6); color: white;
            text-align: center; font-family: 'Cairo'; outline: none;
            transition: 0.3s;
        }
        input:focus { border-color: var(--primary-color); box-shadow: var(--neon-shadow); }

        /* ميزة: بصمة الإصبع المتقدمة */
        .fingerprint-container {
            position: relative; width: 100px; height: 100px; margin: 25px auto;
            border: 3px solid #333; border-radius: 50%; display: flex;
            justify-content: center; align-items: center; cursor: pointer;
        }
        .fingerprint-icon { font-size: 45px; z-index: 2; transition: 0.3s; }
        .scan-bar {
            position: absolute; width: 80%; height: 4px; background: var(--primary-color);
            border-radius: 10px; top: 10%; display: none; z-index: 3;
            box-shadow: 0 0 15px var(--primary-color);
            animation: scanning 2s linear infinite;
        }
        @keyframes scanning { 0%, 100% { top: 20%; } 50% { top: 80%; } }

        /* ميزة: النيون والنبض */
        .heart-container {
            position: absolute; display: none; flex-direction: column;
            align-items: center; z-index: 50; width: 100%;
        }
        .heart-svg { 
            width: 320px; height: 320px; 
            filter: drop-shadow(0 0 10px var(--primary-color));
        }
        .pulsing { animation: heartPulse 1.5s infinite alternate ease-in-out; }
        @keyframes heartPulse { to { transform: scale(1.1); filter: drop-shadow(0 0 30px var(--secondary-color)); } }

        #days-result { 
            margin-top: 20px; font-size: 20px; font-weight: bold; 
            color: gold; text-align: center; opacity: 0; transform: translateY(20px);
        }

        /* الجزيئات السحرية عند اللمس */
        .magic-sparkle {
            position: absolute; width: 8px; height: 8px; border-radius: 50%;
            pointer-events: none; z-index: 999; animation: sparkleFade 1s forwards;
        }
        @keyframes sparkleFade { to { transform: scale(0); opacity: 0; } }

        /* الانفجار الختامي */
        .white-out {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; z-index: 9999; display: none;
        }

        .force-join-msg { font-size: 11px; color: #777; margin-top: 15px; }
        .force-join-msg a { color: var(--primary-color); text-decoration: none; }
    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div class="glass-card" id="input-card">
        <h3>مرحباً بك في بوابة السحر ✨</h3>
        <input type="text" id="user-name" placeholder="أدخل اسمك الجميل...">
        <p style="font-size: 13px; margin: 10px 0 0;">تاريخ ميلادك (لحساب أيام جمالك):</p>
        <input type="date" id="birth-date">
        
        <div class="fingerprint-container" id="fp-btn" onmousedown="startScan()" onmouseup="stopScan()" ontouchstart="startScan()" ontouchend="stopScan()">
            <div class="scan-bar" id="scanner"></div>
            <span class="fingerprint-icon">👆</span>
        </div>
        <p id="status-text" style="font-size: 14px; color: #aaa;">اضغط مطولاً للبصمة لفتح القفل</p>
        
        <div class="force-join-msg">
            يجب أن تكون مشتركاً بـ <a href="https://t.me/aggg4" target="_blank">@aggg4</a> لمتابعة السحر
        </div>
    </div>

    <div class="heart-container" id="heart-display">
        <svg class="heart-svg" viewBox="0 0 100 100">
            <path id="heartPath" fill="none" stroke="#ff1e1e" stroke-width="2.5" d="M50,88 C50,88 10,57 10,32 C10,13 32,10 50,30 C68,10 90,13 90,32 C90,57 50,88 50,88 Z"></path>
            <text x="50" y="45" id="quote-text" fill="white" font-size="5" text-anchor="middle" font-weight="bold" opacity="0"></text>
            <text x="50" y="60" id="name-display" fill="white" font-size="10" text-anchor="middle" font-weight="bold"></text>
        </svg>
        <div id="days-result"></div>
    </div>

    <div class="white-out" id="flash"></div>

    <audio id="sfx-scan" src="https://www.soundjay.com/buttons/button-20.mp3"></audio>
    <audio id="sfx-magic" src="https://www.soundjay.com/misc/sounds/magic-chime-01.mp3"></audio>

    <script>
        // 1. نظام الجسيمات الخلفي (Particles)
        const canvas = document.getElementById('bg-canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        let particles = [];

        class Particle {
            constructor() {
                this.x = Math.random() * canvas.width;
                this.y = Math.random() * canvas.height;
                this.size = Math.random() * 2;
                this.speedX = Math.random() * 0.5 - 0.25;
                this.speedY = Math.random() * 0.5 - 0.25;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.size > 0.2) this.size -= 0.01;
            }
            draw() {
                ctx.fillStyle = 'rgba(255,255,255,0.5)';
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        function animateParticles() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (particles.length < 100) particles.push(new Particle());
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
                if (particles[i].size <= 0.2) {
                    particles.splice(i, 1);
                    i--;
                }
            }
            requestAnimationFrame(animateParticles);
        }
        animateParticles();

        // 2. ميزة اللمس السحري
        window.addEventListener('mousemove', (e) => spawnSparkle(e.x, e.y));
        window.addEventListener('touchmove', (e) => spawnSparkle(e.touches[0].pageX, e.touches[0].pageY));

        function spawnSparkle(x, y) {
            const s = document.createElement('div');
            s.className = 'magic-sparkle';
            s.style.left = x + 'px'; s.style.top = y + 'px';
            s.style.background = `hsl(${Math.random() * 360}, 100%, 70%)`;
            s.style.boxShadow = `0 0 10px ${s.style.background}`;
            document.body.appendChild(s);
            setTimeout(() => s.remove(), 1000);
        }

        // 3. نظام البصمة والمسح
        let scanTimer;
        function startScan() {
            if(!document.getElementById('user-name').value) return alert("من فضلك أدخل اسمك أولاً!");
            document.getElementById('scanner').style.display = 'block';
            document.getElementById('status-text').innerText = "جاري قراءة البصمة...";
            document.getElementById('sfx-scan').play();
            scanTimer = setTimeout(initMagic, 2000);
        }

        function stopScan() {
            clearTimeout(scanTimer);
            document.getElementById('scanner').style.display = 'none';
            if(document.getElementById('status-text').innerText !== "تم التحقق ✅") {
                document.getElementById('status-text').innerText = "اضغط مطولاً للبصمة لفتح القفل";
            }
        }

        // 4. تفعيل السحر والرسائل العشوائية
        const quotes = ["جمالك يزداد كل يوم", "أنت شخص استثنائي جداً", "العالم أجمل بابتسامتك", "قلبك يشع طيبة وسحراً"];

        function initMagic() {
            document.getElementById('status-text').innerText = "تم التحقق ✅";
            document.getElementById('input-card').style.transform = "scale(0) rotate(20deg)";
            document.getElementById('input-card').style.opacity = "0";
            document.getElementById('sfx-magic').play();
            
            setTimeout(() => {
                document.getElementById('input-card').style.display = 'none';
                startCelebration();
            }, 1000);
        }

        function startCelebration() {
            const name = document.getElementById('user-name').value;
            document.getElementById('name-display').textContent = name;
            document.getElementById('quote-text').textContent = quotes[Math.floor(Math.random() * quotes.length)];
            
            const display = document.getElementById('heart-display');
            display.style.display = 'flex';
            
            // حساب الأيام (ميزة متقدمة)
            const birth = new Date(document.getElementById('birth-date').value);
            if(!isNaN(birth)) {
                const diff = Math.floor((new Date() - birth) / (1000 * 60 * 60 * 24));
                document.getElementById('days-result').innerHTML = `أنت تنير عالمنا منذ <br> <span style="font-size:30px;">${diff}</span> يوماً`;
            }

            // رسم القلب بالسحر
            const path = document.getElementById('heartPath');
            const len = path.getTotalLength();
            path.style.strokeDasharray = len;
            path.style.strokeDashoffset = len;
            
            setTimeout(() => {
                path.style.transition = "stroke-dashoffset 4s cubic-bezier(0.4, 0, 0.2, 1)";
                path.style.strokeDashoffset = "0";
                setTimeout(() => {
                    document.getElementById('heart-display').classList.add('pulsing');
                    document.getElementById('quote-text').style.opacity = "1";
                    document.getElementById('days-result').style.opacity = "1";
                    document.getElementById('days-result').style.transform = "translateY(0)";
                    
                    // التحويل النهائي مع انفجار ضوئي
                    setTimeout(triggerFinalTransition, 8000);
                }, 4000);
            }, 500);
        }

        function triggerFinalTransition() {
            const flash = document.getElementById('flash');
            flash.style.display = 'block';
            setTimeout(() => {
                flash.style.opacity = '1';
                setTimeout(() => {
                    window.location.href = 'https://t.me/mnshtrk';
                }, 1000);
            }, 50);
        }
    </script>
</body>
</html>
