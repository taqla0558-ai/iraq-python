<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إلى الأبد ✨</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');

        body { 
            background: #000;
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            font-family: 'Cairo', sans-serif;
            overflow: hidden;
            color: white;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
        }

        /* نص التعليمات يظهر فوراً لمنع الصفحة البيضاء */
        #instruction {
            font-size: 24px;
            text-shadow: 0 0 20px rgba(255, 50, 50, 0.8);
            animation: floating 3s infinite ease-in-out;
            z-index: 100;
            font-weight: bold;
            text-align: center;
            position: absolute;
            width: 100%;
        }

        @keyframes floating {
            0%, 100% { transform: translateY(0); opacity: 0.8; }
            50% { transform: translateY(-15px); opacity: 1; }
        }

        /* حاوية القلب متمركزة 100% في وسط الشاشة */
        .heart-container {
            position: absolute;
            width: 300px; 
            height: 300px;
            z-index: 10;
            display: none; /* تظهر فقط عند اللمس */
            justify-content: center;
            align-items: center;
            pointer-events: none;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
        }

        .text {
            position: absolute;
            color: white;
            font-weight: bold;
            font-size: 28px;
            text-align: center;
            z-index: 11;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.9);
            width: 100%;
        }

        svg { width: 100%; height: 100%; }

        .heart-path {
            fill: none;
            stroke: #ff1e1e;
            stroke-width: 3;
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
        }

        /* أنميشن رسم القلب والنبض */
        .active .heart-path {
            animation: drawHeart 3s forwards ease-in-out, neonPulse 2s 3s infinite alternate;
        }

        @keyframes drawHeart {
            0% { stroke-dashoffset: 1000; fill: rgba(255, 30, 30, 0); }
            100% { stroke-dashoffset: 0; fill: rgba(255, 30, 30, 0.5); }
        }

        @keyframes neonPulse {
            from { filter: drop-shadow(0 0 15px #ff0000); transform: scale(1); }
            to { filter: drop-shadow(0 0 35px #ff0055); transform: scale(1.05); }
        }

        /* جزيئات الورود المنفجرة */
        .flower-particle {
            position: absolute;
            pointer-events: none;
            font-size: 32px;
            z-index: 150;
            width: 40px;
            height: 40px;
            text-align: center;
            line-height: 40px;
            margin-left: -20px; 
            margin-top: -20px;
        }

        @keyframes burstEffect {
            0% { transform: translate(0, 0) scale(0); opacity: 1; }
            100% { transform: translate(var(--dx), var(--dy)) rotate(var(--rotation)) scale(var(--scale)); opacity: 0; }
        }
    </style>
</head>
<body id="body">

    <div id="instruction">المس الشاشة ياجميلي.. ✨</div>

    <div class="heart-container" id="mainHeart">
        <svg viewBox="0 0 100 100">
            <path class="heart-path" d="M50,88 C50,88 10,57 10,32 C10,13 32,10 50,30 C68,10 90,13 90,32 C90,57 50,88 50,88 Z"></path>
        </svg>
        <div class="text">أنتَ عمري<br>ونبض قلبي ❤️</div>
    </div>

    <script>
        const body = document.getElementById('body');
        const instruction = document.getElementById('instruction');
        const mainHeart = document.getElementById('mainHeart');
        let activated = false;

        // وظيفة انفجار الورود بتوزيع دائري متساوي
        function createFlowerBurst(x, y) {
            const flowers = ['🌹', '🌸', '💐', '🌺'];
            for (let i = 0; i < 100; i++) {
                const f = document.createElement('div');
                f.className = 'flower-particle';
                f.innerHTML = flowers[Math.floor(Math.random() * flowers.length)];
                
                const angle = Math.random() * Math.PI * 2;
                const distance = Math.random() * 450 + 50;
                
                f.style.left = x + 'px';
                f.style.top = y + 'px';
                f.style.setProperty('--dx', Math.cos(angle) * distance + 'px');
                f.style.setProperty('--dy', Math.sin(angle) * distance + 'px');
                f.style.setProperty('--rotation', (Math.random() * 720 - 360) + 'deg');
                f.style.setProperty('--scale', Math.random() * 1.5 + 0.5);
                
                f.style.animation = `burstEffect ${Math.random() * 1 + 1.5}s forwards cubic-bezier(0.1, 0.8, 0.3, 1)`;
                
                body.appendChild(f);
                setTimeout(() => f.remove(), 2500);
            }
        }

        // الوظيفة الرئيسية عند اللمس
        function handleStart(e) {
            if (activated) return;
            activated = true;
            
            // تحديد إحداثيات اللمس بدقة (موبايل أو كمبيوتر)
            const clientX = e.clientX || (e.touches && e.touches[0].clientX);
            const clientY = e.clientY || (e.touches && e.touches[0].clientY);

            // إخفاء التعليمات وإظهار القلب
            instruction.style.display = 'none';
            mainHeart.style.display = 'flex';
            
            // إضافة كلاس التفعيل للبدء بأنميشن القلب
            setTimeout(() => {
                mainHeart.classList.add('active');
            }, 10);
            
            // تشغيل الانفجار
            createFlowerBurst(clientX, clientY);

            // الانتقال للقناة بعد 10 ثوانٍ
            setTimeout(() => {
                window.location.href = 'https://t.me/mnshtrk';
            }, 10000);
        }

        // الاستماع للضغط واللمس
        body.addEventListener('mousedown', handleStart);
        body.addEventListener('touchstart', handleStart, { passive: false });
    </script>
</body>
</html>
