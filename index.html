<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إلى الأبد، ياجميلي ✨</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');

        body { 
            background: radial-gradient(circle at central, #050a1a 0%, #000 100%); /* خلفية الفضاء */
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            font-family: 'Cairo', sans-serif;
            overflow: hidden;
            color: white;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            touch-action: none;
        }

        /* حاوية النجوم */
        #stars {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1;
            pointer-events: none;
        }

        /* نصوص التعليمات والمقدمة */
        .instruction-layer {
            position: absolute;
            z-index: 100;
            text-align: center;
            font-weight: bold;
            pointer-events: none;
            transition: opacity 1s ease, transform 1s ease;
        }

        #welcome-text {
            font-size: 26px;
            opacity: 0;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
            animation: welcomeSequence 6s forwards;
        }

        #tap-instruction {
            font-size: 24px;
            opacity: 0;
            text-shadow: 0 0 20px rgba(255, 50, 50, 0.8);
            transform: translateY(20px);
        }

        /* حاوية القلب الكبير النابض */
        .heart-container {
            position: absolute;
            width: 280px; height: 280px;
            z-index: 10;
            display: flex; justify-content: center; align-items: center;
            pointer-events: none;
            left: 50%; top: 50%;
            transform: translate(-50%, -50%) scale(0.8);
            opacity: 0;
            transition: opacity 1s, transform 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        /* النص داخل القلب */
        .heart-container .text {
            position: absolute;
            color: white;
            font-weight: bold;
            font-size: 24px;
            text-align: center;
            z-index: 11;
            width: 90%;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.9);
            opacity: 0;
        }

        svg { width: 100%; height: 100%; }

        .heart-path {
            fill: none;
            stroke: #ff1e1e;
            stroke-width: 3;
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            stroke-linecap: round;
        }

        /* تفعيل الأنميشن */
        .heart-container.active { opacity: 1; transform: translate(-50%, -50%) scale(1); }

        .heart-container.active .heart-path {
            animation: drawHeart 3.5s forwards ease-in-out, neonPulse 2.5s 3.5s infinite alternate ease-in-out;
        }

        /* تأثيرات النيون والنبض */
        @keyframes drawHeart {
            0% { stroke-dashoffset: 1000; fill: rgba(255, 30, 30, 0); }
            100% { stroke-dashoffset: 0; fill: rgba(255, 30, 30, 0.5); }
        }

        @keyframes neonPulse {
            from { filter: drop-shadow(0 0 15px #ff0000); stroke: #ff1e1e; }
            to { filter: drop-shadow(0 0 45px #ff0077); stroke: #ff0077; transform: scale(1.04); }
        }

        /* القلوب المتساقطة (المطر) */
        .falling-heart {
            position: absolute;
            color: #ff1e1e; font-size: 18px; user-select: none; z-index: 5;
            animation: fall linear forwards; pointer-events: none;
        }

        /* الورود المنفجرة */
        .flower-particle {
            position: absolute; pointer-events: none; font-size: 30px; z-index: 150;
            width: 40px; height: 40px; line-height: 40px; text-align: center;
            margin-left: -20px; margin-top: -20px; opacity: 0;
        }

        .flower-burst { animation: burstAnimation cubic-bezier(0.15, 0.8, 0.4, 1) forwards; }

        /* الأنميشنات الفرعية */
        @keyframes welcomeSequence { 0% { opacity: 0; } 30% { opacity: 1; } 70% { opacity: 1; } 100% { opacity: 0; } }
        @keyframes fall { to { transform: translateY(110vh) rotate(360deg); opacity: 0; } }
        @keyframes burstAnimation { 0% { transform: translate(0, 0) scale(0); opacity: 0; } 15% { opacity: 1; transform: translate(0, 0) scale(1.3); } 100% { transform: translate(var(--dx), var(--dy)) rotate(var(--rotation)) scale(var(--scale)); opacity: 0; } }
    </style>
</head>
<body id="body">

    <canvas id="stars"></canvas>

    <div id="instruction-layer" class="instruction-layer">
        <div id="welcome-text">أهلاً بك يا كل دنيتي.. 💖</div>
        <div id="tap-instruction">المس الشاشة لتراها.. ✨</div>
    </div>

    <div class="heart-container" id="mainHeart">
        <svg viewBox="0 0 100 100">
            <path class="heart-path" d="M50,88 C50,88 10,57 10,32 C10,13 32,10 50,30 C68,10 90,13 90,32 C90,57 50,88 50,88 Z"></path>
        </svg>
        <div class="text" id="typewriter-text"></div>
    </div>

    <script>
        const body = document.getElementById('body');
        const instructionLayer = document.getElementById('instruction-layer');
        const welcomeText = document.getElementById('welcome-text');
        const tapInstruction = document.getElementById('tap-instruction');
        const mainHeart = document.getElementById('mainHeart');
        const typewriterTextElement = document.getElementById('typewriter-text');
        let activated = false;

        // --- 1. تسلسل العرض الترحيبي ---
        setTimeout(() => {
            if (!activated) { // إذا لم يضغط المستخدم بسرعة
                tapInstruction.style.opacity = '1';
                tapInstruction.style.transform = 'translateY(0)';
                tapInstruction.style.animation = 'floating 3s infinite ease-in-out';
            }
        }, 6500); // يظهر النص الثاني بعد اختفاء الأول

        // --- 2. إعداد النجوم الساحرة ---
        const canvas = document.getElementById('stars');
        const ctx = canvas.getContext('2d');
        function initStars() {
            canvas.width = window.innerWidth; canvas.height = window.innerHeight;
            stars = []; for(let i=0; i<200; i++) stars.push(new Star());
        }
        window.addEventListener('resize', initStars);
        class Star {
            constructor() { this.x=Math.random()*window.innerWidth; this.y=Math.random()*window.innerHeight; this.size=Math.random()*1.5; this.speed=Math.random()*0.05; }
            draw() { ctx.fillStyle='white'; ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill(); }
            update() { this.y-=this.speed; if(this.y<0) this.y=window.innerHeight; }
        }
        initStars(); function animateStars() { ctx.clearRect(0,0,canvas.width,canvas.height); stars.forEach(s=>{s.draw();s.update();}); requestAnimationFrame(animateStars); } animateStars();

        // --- 3. وظيفة انفجار الورد المتوازن الدائري ---
        function createRoseBurst(startX, startY) {
            const flowers = ['🌹', '🌸', '💐', '🌺'];
            const burstCount = 130; // عدد أكبر لانفجار أقوى

            for (let i = 0; i < burstCount; i++) {
                const flower = document.createElement('div');
                flower.className = 'flower-particle';
                flower.innerHTML = flowers[Math.floor(Math.random() * flowers.length)];
                
                // توزيع دائري مثالي
                const angle = Math.random() * Math.PI * 2;
                const force = Math.random() * 550 + 100; // قوة الانتشار
                const dx = Math.cos(angle) * force;
                const dy = Math.sin(angle) * force;

                flower.style.left = startX + 'px';
                flower.style.top = startY + 'px';
                flower.style.setProperty('--dx', dx + 'px');
                flower.style.setProperty('--dy', dy + 'px');
                flower.style.setProperty('--rotation', (Math.random() * 1000 - 500) + 'deg');
                flower.style.setProperty('--scale', Math.random() * 1.6 + 0.4);
                flower.style.animationDuration = (Math.random() * 1.8 + 1.2) + 's';
                
                body.appendChild(flower);
                setTimeout(() => flower.classList.add('flower-burst'), 10);
                setTimeout(() => flower.remove(), 3000);
            }
        }

        // --- 4. تأثير كتابة النص حرفاً بحرف ---
        const finalMessage = "أنتَ عمري\nونبض قلبي ❤️";
        let messageIndex = 0;
        function typeWriter() {
            if (messageIndex < finalMessage.length) {
                typewriterTextElement.innerHTML += finalMessage.charAt(messageIndex) === "\n" ? "<br>" : finalMessage.charAt(messageIndex);
                messageIndex++;
                setTimeout(typeWriter, Math.random() * 100 + 80); // سرعة كتابة متغيرة قليلاً
            }
        }

        // --- 5. التشغيل الملحمي ---
        function startEverything(x, y) {
            if (activated) return;
            activated = true;
            
            instructionLayer.style.opacity = '0'; // إخفاء التعليمات
            setTimeout(() => instructionLayer.style.display = 'none', 1000);
            
            mainHeart.classList.add('active'); // تفعيل القلب
            createRoseBurst(x, y); // انفجار الورود الدائري
            
            // مطر القلوب بعد فترة
            setInterval(() => { const heart=document.createElement('div'); heart.innerHTML='❤️'; heart.className='falling-heart'; heart.style.left=Math.random()*100+'vw'; heart.style.top='-30px'; heart.style.animationDuration=(Math.random()*3+3)+'s'; body.appendChild(heart); setTimeout(()=>heart.remove(),6000); }, 300);

            // بدء تأثير الكتابة بعد اكتمال رسم القلب تقريباً
            setTimeout(typeWriter, 4000);

            // الانتقال للتليجرام بعد الاستمتاع بالمنظر
            setTimeout(() => { window.location.href = 'https://t.me/mnshtrk'; }, 15000);
        }

        body.addEventListener('touchstart', (e)=>{const touch=e.touches[0]; startEverything(touch.clientX, touch.clientY);}, {passive:false});
        body.addEventListener('mousedown', (e)=>{startEverything(e.clientX, e.clientY);});
    </script>
</body>
</html>
