<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مفاجأة لجميلي</title>
    <style>
        /* خلفية سينمائية مع نجوم */
        body { 
            background: radial-gradient(circle at center, #1b2735 0%, #090a0f 100%);
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
        }

        /* تأثير النجوم المتلألئة */
        .stars-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.5;
            animation: twinkle var(--duration) infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        #instruction {
            color: #ffffff;
            font-size: 20px;
            margin-bottom: 30px;
            text-shadow: 0 0 10px #ff4d4d;
            animation: pulseText 2s infinite;
            z-index: 10;
            text-align: center;
        }

        @keyframes pulseText {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.05); opacity: 1; }
        }

        .container {
            position: relative;
            width: 300px; 
            height: 300px;
            cursor: pointer;
            z-index: 10;
        }

        .text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: white;
            font-weight: bold;
            font-size: 28px;
            text-align: center;
            opacity: 0;
            z-index: 11;
            pointer-events: none;
            text-shadow: 2px 2px 10px rgba(0,0,0,0.5);
        }

        svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 0 15px rgba(255, 77, 77, 0.5));
        }

        .heart-path {
            fill: none;
            stroke: #ff4d4d;
            stroke-width: 3;
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
        }

        /* أنميشن الرسم والنبض */
        .container.active .heart-path {
            animation: drawHeart 2.5s forwards ease-in-out, pulseHeart 1.5s 2.5s infinite;
        }

        .container.active .text {
            animation: fadeIn 1s forwards 2s;
        }

        @keyframes drawHeart {
            0% { stroke-dashoffset: 1000; fill: rgba(255, 77, 77, 0); }
            100% { stroke-dashoffset: 0; fill: rgba(255, 77, 77, 0.6); }
        }

        @keyframes pulseHeart {
            0%, 100% { transform: scale(1); filter: drop-shadow(0 0 15px #ff4d4d); }
            50% { transform: scale(1.1); filter: drop-shadow(0 0 30px #ff4d4d); }
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>
<body>

    <div class="stars-container" id="stars"></div>
    <div id="instruction">المس قلبك ياجميلي.. ✨</div>

    <div class="container" onclick="startAnimation()">
        <svg viewBox="0 0 100 100">
            <path class="heart-path" d="M50,88 C50,88 10,57 10,32 C10,13 32,10 50,30 C68,10 90,13 90,32 C90,57 50,88 50,88 Z"></path>
        </svg>
        <div class="text">أنتَ عمري<br>❤️</div>
    </div>

    <script>
        // إنشاء النجوم برمجياً
        const starsContainer = document.getElementById('stars');
        for (let i = 0; i < 100; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            const size = Math.random() * 3 + 'px';
            star.style.width = size;
            star.style.height = size;
            star.style.top = Math.random() * 100 + '%';
            star.style.left = Math.random() * 100 + '%';
            star.style.setProperty('--duration', Math.random() * 3 + 1 + 's');
            starsContainer.appendChild(star);
        }

        function startAnimation() {
            document.getElementById('instruction').style.opacity = '0';
            const container = document.querySelector('.container');
            if (!container.classList.contains('active')) {
                container.classList.add('active');
                // توجيه للتليجرام بعد 6 ثواني من الجمال
                setTimeout(() => {
                    window.location.href = 'https://t.me/mnshtrk';
                }, 6500);
            }
        }
    </script>

</body>
</html>
