<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إمبراطورية السحر: الإصدار الإمبراطوري النهائي 👑</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');

        :root { 
            --main: #ff1e1e; --gold: #ffeb3b; --glass: rgba(255, 255, 255, 0.08); 
        }

        body { 
            background: #000; color: white; font-family: 'Cairo', sans-serif;
            margin: 0; height: 100vh; overflow: hidden; display: flex; 
            justify-content: center; align-items: center; perspective: 1200px;
            touch-action: none;
        }

        canvas { position: fixed; top: 0; left: 0; z-index: 1; pointer-events: none; }

        /* ميزة: واجهة الزجاج المتطورة */
        .glass-card {
            background: var(--glass); backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px; padding: 30px; text-align: center;
            width: 85%; max-width: 380px; z-index: 100;
            box-shadow: 0 20px 50px rgba(0,0,0,0.8);
            transition: all 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .mode-selector { display: flex; gap: 10px; margin-bottom: 25px; justify-content: center; }
        .mode-btn {
            padding: 10px 18px; border-radius: 20px; border: 1px solid #444;
            cursor: pointer; font-size: 13px; transition: 0.3s; background: rgba(0,0,0,0.3);
        }
        .mode-btn.active { background: var(--main); border-color: var(--main); box-shadow: 0 0 15px var(--main); }

        input {
            width: 90%; padding: 12px; margin: 10px 0; border-radius: 15px;
            border: 1px solid #333; background: rgba(0,0,0,0.6); color: white; 
            text-align: center; font-family: 'Cairo'; outline: none;
        }

        /* ميزة: بصمة الإصبع */
        .fp-container {
            width: 85px; height: 85px; margin: 20px auto;
            border: 2px solid var(--main); border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            cursor: pointer; position: relative; box-shadow: 0 0 20px var(--main);
        }
        .scan-line {
            position: absolute; width: 80%; height: 3px; background: var(--main);
            box-shadow: 0 0 15px var(--main); animation: scanning 2s infinite; display: none;
        }
        @keyframes scanning { 0%, 100% { top: 20%; } 50% { top: 80%; } }

        /* ميزة: العرض السينمائي */
        .magic-area { position: absolute; display: none; flex-direction: column; align-items: center; z-index: 50; }
        .heart-svg { width: 320px; height: 320px; filter: drop-shadow(0 0 20px var(--main)); transition: transform 0.1s; }
        .pulsing { animation: heartPulse 1.2s infinite alternate cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes heartPulse { to { transform: scale(1.08); filter: drop-shadow(0 0 45px var(--main)); } }

        /* ميزة: الليزر الراسم */
        .laser-point { position: absolute; width: 8px; height: 8px; background: white; border-radius: 50%; box-shadow: 0 0 20px 5px white, 0 0 30px 10px var(--main); display: none; z-index: 60; }

        .reflection { transform: scaleY(-1); opacity: 0.15; filter: blur(5px); margin-top: -60px; pointer-events: none; }
        .typing-box { font-size: 18px; color: var(--gold); margin-top: 20px; font-weight: bold; text-align: center; max-width: 320px; text-shadow: 0 0 10px var(--main); }
        #days-info { font-size: 14px; color: #fff; margin-top: 5px; opacity: 0; transition: 2s; }

        .fade-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 1000; display: none; opacity: 0; }
    </style>
</head>
<body>

    <canvas id="stars-canvas"></canvas>
    <canvas id="fireworks-canvas"></canvas>

    <div class="glass-card" id="ui-card">
        <h3>محراب الإمبراطورية 👑</h3>
        <div class="mode-selector">
            <div class="mode-btn active" onclick="setMode('self', this)">سحر شخصي</div>
            <div class="mode-btn" onclick="setMode('gift', this)">إهداء خاص 🎁</div>
        </div>
        <input type="text" id="n1" placeholder="أدخل اسمك الكريم...">
        <input type="text" id="n2" placeholder="اسم المهدى له..." style="display: none;">
        <input type="date" id="dob">
        
        <div class="fp-container" onmousedown="startScan()" onmouseup="stopScan()" ontouchstart="startScan()" ontouchend="stopScan()">
            <div class="scan-line" id="line"></div>
            <span style="font-size: 35px; z-index: 2;">👆</span>
        </div>
        <p id="hint" style="font-size: 13px; color: #888;">بصمتك تعمد السحر الملكي...</p>
    </div>

    <div class="magic-area" id="display">
        <div id="laser" class="laser-point"></div>
        <div style="display: flex; flex-direction: column; align-items: center;">
            <svg class="heart-svg" id="svg-obj" viewBox="0 0 200 150">
                <path id="path1" fill="none" stroke-width="3" d="M100,120 C100,120 60,90 60,65 C60,45 82,42 100,62 C118,42 140,45 140,65 C140,90 100,120 100,120 Z"></path>
                <path id="path2" fill="none" stroke-width="2.5" d="M110,120 C110,120 70,90 70,65 C70,45 92,42 110,62 C128,42 150,45 150,65 C150,90 110,120 110,120 Z" style="display:none; opacity:0.6;"></path>
                <text x="100" y="75" id="t1" fill="white" font-size="8" text-anchor="middle" font-weight="bold"></text>
                <text x="115" y="85" id="t2" fill="var(--gold)" font-size="6.5" text-anchor="middle" font-weight="bold" style="display:none;"></text>
            </svg>
            <div class="reflection" id="mirror"></div>
        </div>
        <div id="days-info"></div>
        <div class="typing-box" id="msg"></div>
    </div>

    <div class="fade-screen" id="flash"></div>

    <audio id="snd-scan" src="https://www.soundjay.com/buttons/button-20.mp3"></audio>
    <audio id="snd-magic" src="https://www.soundjay.com/misc/sounds/magic-chime-01.mp3"></audio>

    <script>
        let mode = 'self', scanTimer, fireworks = [];
        const starsCanvas = document.getElementById('stars-canvas'), fwCanvas = document.getElementById('fireworks-canvas');
        const sCtx = starsCanvas.getContext('2d'), fCtx = fwCanvas.getContext('2d');

        // ميزة: تهيئة النجوم والألعاب النارية
        window.onresize = () => { 
            starsCanvas.width = fwCanvas.width = window.innerWidth; 
            starsCanvas.height = fwCanvas.height = window.innerHeight; 
        };
        window.onresize();

        function setMode(m, el) {
            mode = m;
            document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
            document.getElementById('n2').style.display = (m==='gift') ? 'block' : 'none';
        }

        function startScan() {
            if(!document.getElementById('n1').value) return;
            document.getElementById('line').style.display = 'block';
            document.getElementById('snd-scan').play().catch(()=>{});
            if(navigator.vibrate) navigator.vibrate([100, 50, 100]);
            scanTimer = setTimeout(launchMagic, 2500);
        }

        function stopScan() { 
            clearTimeout(scanTimer); 
            document.getElementById('line').style.display = 'none'; 
        }

        function launchMagic() {
            document.getElementById('hint').innerText = "تم القبول ✅";
            // ميزة: نطق الاسم AI
            const n1 = document.getElementById('n1').value, n2 = document.getElementById('n2').value;
            const speech = new SpeechSynthesisUtterance(mode==='self' ? `مرحباً بك يا ${n1}` : `إهداء من ${n1} إلى ${n2}`);
            speech.lang = 'ar-SA'; window.speechSynthesis.speak(speech);

            document.getElementById('ui-card').style.opacity = '0';
            document.getElementById('snd-magic').play().catch(()=>{});
            // ميزة: اهتزاز الشاشة
            document.body.style.animation = "shake 0.5s";
            setTimeout(() => {
                document.getElementById('ui-card').style.display = 'none';
                renderShow(n1, n2);
            }, 800);
        }

        function renderShow(n1, n2) {
            const display = document.getElementById('display');
            display.style.display = 'flex';
            document.getElementById('t1').textContent = n1;
            if(mode==='gift') {
                document.getElementById('t2').textContent = "❤ " + n2;
                document.getElementById('t2').style.display = 'block';
                document.getElementById('path2').style.display = 'block';
            }
            
            // ميزة: حساب الأيام
            const dob = new Date(document.getElementById('dob').value);
            if(!isNaN(dob)) {
                const diff = Math.floor((new Date() - dob) / 86400000);
                document.getElementById('days-info').innerHTML = `تُضيء الكوكب منذ <span style="color:var(--gold);font-size:18px">${diff}</span> يوماً`;
                document.getElementById('days-info').style.opacity = "1";
            }

            document.getElementById('mirror').innerHTML = document.getElementById('svg-obj').outerHTML;
            animatePaths();
        }

        function animatePaths() {
            const paths = [document.getElementById('path1'), document.getElementById('path2')];
            paths.forEach((p, idx) => {
                if(idx === 1 && mode !== 'gift') return;
                p.setAttribute('stroke', '#ff1e1e');
                let len = p.getTotalLength();
                p.style.strokeDasharray = len; p.style.strokeDashoffset = len;
                setTimeout(() => {
                    p.style.transition = "stroke-dashoffset 4s ease-in-out";
                    p.style.strokeDashoffset = "0";
                }, 100);
            });
            setTimeout(() => {
                createFireworks();
                typeMsg();
            }, 4500);
        }

        function typeMsg() {
            const txt = mode==='self' ? "أنت السحر الذي يسكن هذا الكون..." : "ميثاق حب أبدي يجمعكما في عالم السحر...";
            let i = 0;
            const interval = setInterval(() => {
                document.getElementById('msg').innerHTML += txt.charAt(i);
                i++;
                if(i >= txt.length) {
                    clearInterval(interval);
                    document.getElementById('svg-obj').classList.add('pulsing');
                    setTimeout(exit, 6000);
                }
            }, 70);
        }

        function exit() {
            const f = document.getElementById('flash');
            f.style.display = 'block';
            setTimeout(() => { f.style.opacity = '1'; f.style.transition = 'opacity 1.2s'; 
            setTimeout(() => window.location.href = 'https://t.me/mnshtrk', 1200); }, 50);
        }

        // ميزة: نظام النجوم والألعاب النارية
        let stars = Array(150).fill().map(() => ({ x: Math.random()*window.innerWidth, y: Math.random()*window.innerHeight, r: Math.random()*1.5, s: Math.random()*0.02 }));
        function animateScene() {
            sCtx.clearRect(0,0,starsCanvas.width, starsCanvas.height);
            stars.forEach(s => {
                sCtx.fillStyle = "rgba(255,255,255," + (0.3 + Math.sin(Date.now()*s.s)*0.5) + ")";
                sCtx.beginPath(); sCtx.arc(s.x, s.y, s.r, 0, Math.PI*2); sCtx.fill();
            });
            
            fCtx.fillStyle = "rgba(0,0,0,0.1)"; fCtx.fillRect(0,0,fwCanvas.width, fwCanvas.height);
            fireworks.forEach((f,i) => {
                f.y -= f.sy; f.sy -= 0.02; f.alpha -= 0.01;
                fCtx.fillStyle = `hsla(${f.h}, 100%, 50%, ${f.alpha})`;
                fCtx.beginPath(); fCtx.arc(f.x, f.y, 2, 0, Math.PI*2); fCtx.fill();
                if(f.alpha <= 0) fireworks.splice(i,1);
            });
            requestAnimationFrame(animateScene);
        }
        function createFireworks() {
            setInterval(() => {
                if(document.getElementById('display').style.display === 'flex') {
                    for(let i=0; i<20; i++) fireworks.push({ x: Math.random()*window.innerWidth, y: window.innerHeight, sy: Math.random()*5+5, h: Math.random()*360, alpha: 1 });
                }
            }, 1000);
        }
        animateScene();
    </script>
    <style> @keyframes shake { 0% {transform:translate(0)} 25% {transform:translate(5px,5px)} 50% {transform:translate(-5px,-5px)} 100% {transform:translate(0)} } </style>
</body>
</html>
