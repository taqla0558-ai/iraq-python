<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إلى الأبد ✨</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');

        body { 
            background: #000;
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            font-family: 'Cairo', sans-serif;
            overflow: hidden;
            color: white;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent; /* إزالة لون التحديد عند اللمس */
        }

        /* نص التعليمات */
        #instruction {
            font-size: 24px;
            margin-bottom: 50px;
            text-shadow: 0 0 20px rgba(255, 50, 50, 0.8);
            animation: floating 3s infinite ease-in-out;
            z-index: 100;
            font-weight: bold;
            text-align: center;
            pointer-events: none; /* منع النص من اعتراض اللمس */
        }

        @keyframes floating {
            0%, 100% { transform: translateY(0); opacity: 0.7; }
            50% { transform: translateY(-15px); opacity: 1; }
        }

        /* حاوية القلب الكبير */
        .heart-container {
            position: relative;
            width: 300px; 
            height: 300px;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
        }

        .text {
            position: absolute;
            color: white;
            font-weight: bold;
            font-size: 28px;
            text-align: center;
            opacity: 0;
            z-index: 11;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.9);
            transform: scale(0.5);
            transition: all 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 0 15px rgba(255, 0, 0, 0.6));
        }

        .heart-path {
            fill: none;
            stroke: #ff1e1e;
            stroke-width: 3;
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            stroke-linecap: round;
        }

        .heart-container.active .heart-path {
            animation: drawHeart 3.5s forwards ease-in-out, neonPulse 2s 3.5s infinite alternate;
        }

        .heart-container.active .text {
            opacity: 1;
            transform: scale(1);
        }

        @keyframes drawHeart {
            0% { stroke-dashoffset: 1000; fill: rgba(255, 30, 30, 0); }
            100% { stroke-dashoffset: 0; fill: rgba(255, 30, 30, 0.5); }
        }

        @keyframes neonPulse {
            from { filter: drop-shadow(0 0 15px #ff0000); stroke: #ff1e1e; }
            to { filter: drop-shadow(0 0 35px #ff0055); stroke: #ff0055; transform: scale(1.03); }
        }

        /* القلوب المتساقطة */
        .falling-heart {
            position: absolute;
            color: #ff1e1e;
            font-size: 18px;
            user-select: none;
            z-index: 5;
            animation: fall linear forwards;
            pointer-events: none;
        }

        @keyframes fall {
            to { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }

        /* جسيمات انفجار الورد (تم تعديلها لتعمل بالـ CSS) */
        .flower-particle {
            position: absolute;
            pointer-events: none;
            font-size: 30px; /* حجم أكبر للورود */
            z-index: 150;
            opacity: 0;
            transform: translate(0, 0) scale(1);
        }

        /* هذه الفئة سيتم إضافتها عبر الجافاسكريبت لتشغيل الأنميشن */
        .flower-burst {
            animation: burstAnimation cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
        }

        @keyframes burstAnimation {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            80% { opacity: 1; }
            100% { transform: translate(var(--dx), var(--dy)) rotate(var(--rotation)) scale(var(--scale)); opacity: 0; }
        }
    </style>
</head>
<body id="body">

    <div id="instruction">المس الشاشة ياجميلي.. ✨</div>

    <div class="heart-container" id="mainHeart">
        <svg viewBox="0 0 100 100">
            <path class="heart-path" d="M50,88 C50,88 10,57 10,32 C10,13 32,10 50,30 C68,10 90,13 90,32 C90,57 50,88 50,88 Z"></path>
        </svg>
        <div class="text">أنتَ عمري<br>ونبض قلبي ❤️</div>
    </div>

    <script>
        const body = document.getElementById('body');
        const instruction = document.getElementById('instruction');
        const mainHeart = document.getElementById('mainHeart');
        let activated = false;

        // --- وظيفة انفجار الورد (المعاد كتابتها) ---
        function createRoseBurst(startX, startY) {
            const flowers = ['🌹', '🌸', '💐', '🌺'];
            const burstCount = 100; // عدد الورود في الانفجار

            for (let i = 0; i < burstCount; i++) {
                const flower = document.createElement('div');
                flower.className = 'flower-particle';
                flower.innerHTML = flowers[Math.floor(Math.random() * flowers.length)];
                
                // حساب اتجاه عشوائي بقوة مختلفة
                const angle = Math.random() * Math.PI * 2;
                const force = Math.random() * 450 + 100; // قوة الانفجار
                const dx = Math.cos(angle) * force;
                const dy = Math.sin(angle) * force;

                // إعدادات الأنميشن عبر CSS variables
                flower.style.left = startX + 'px';
                flower.style.top = startY + 'px';
                flower.style.setProperty('--dx', dx + 'px');
                flower.style.setProperty('--dy', dy + 'px');
                flower.style.setProperty('--rotation', (Math.random() * 720 - 360) + 'deg');
                flower.style.setProperty('--scale', Math.random() * 1.5 + 0.5);
                
                // مدة عشوائية للأنميشن
                flower.style.animationDuration = (Math.random() * 1.5 + 1.2) + 's';
                
                body.appendChild(flower);
                
                // إضافة الفئة التي تشغل الأنميشن
                // نستخدم setTimeout لضمان أن المتصفح قد قام برسم العنصر أولاً
                setTimeout(() => {
                    flower.classList.add('flower-burst');
                }, 10);

                // إزالة العنصر بعد انتهاء الأنميشن
                setTimeout(() => flower.remove(), 2700);
            }
        }

        // --- وظيفة مطر القلوب ---
        function createFallingHeart() {
            const heart = document.createElement('div');
            heart.innerHTML = '❤️';
            heart.className = 'falling-heart';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.top = '-20px'; // البداية من فوق الشاشة
            heart.style.animationDuration = (Math.random() * 3 + 2.5) + 's'; // سرعات مختلفة
            heart.style.opacity = Math.random() * 0.7 + 0.3; // شفافية مختلفة
            body.appendChild(heart);
            setTimeout(() => heart.remove(), 5500);
        }

        // --- الوظيفة الرئيسية لتشغيل كل شيء ---
        function startEverything(e) {
            if (activated) return; // منع التشغيل المتكرر
            activated = true;
            
            // 1. إخفاء نص التعليمات
            instruction.style.display = 'none';
            
            // 2. تفعيل أنميشن القلب الكبير والنص
            mainHeart.classList.add('active');
            
            // 3. تشغيل انفجار الورود فوراً من مكان الضغط
            createRoseBurst(e.clientX, e.clientY);
            
            // 4. بدء مطر القلوب المستمر
            setInterval(createFallingHeart, 300);

            // 5. الانتقال للتليجرام بعد انتهاء العرض (11 ثانية)
            setTimeout(() => {
                window.location.href = 'https://t.me/mnshtrk';
            }, 11000);
        }

        // --- تسجيل المستمعين للأحداث (اللمس والضغط) ---
        // اللمس على الموبايل
        body.addEventListener('touchstart', (e) => {
            // e.touches[0] يحتوي على إحداثيات اللمسة الأولى
            if (!activated) {
                startEverything(e.touches[0]);
                e.preventDefault(); // منع المتصفح من معالجة اللمسة كضغطة ماوس
            }
        }, { passive: false });

        // الضغط بالماوس (للكمبيوتر)
        body.addEventListener('mousedown', (e) => {
            if (!activated) {
                startEverything(e);
            }
        });
    </script>
</body>
</html>
