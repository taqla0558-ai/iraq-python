<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إلى الأبد ✨</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');

        body { 
            background: #000;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            font-family: 'Cairo', sans-serif;
            overflow: hidden;
            color: white;
        }

        /* واجهة إدخال الاسم */
        #name-screen {
            text-align: center;
            z-index: 200;
            transition: opacity 0.8s ease;
        }

        h2 { font-size: 24px; margin-bottom: 20px; text-shadow: 0 0 10px #ff1e1e; }

        input {
            padding: 12px;
            font-size: 18px;
            border-radius: 10px;
            border: 2px solid #ff1e1e;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            text-align: center;
            outline: none;
            width: 200px;
            font-family: 'Cairo', sans-serif;
        }

        button {
            display: block;
            margin: 20px auto;
            padding: 10px 30px;
            font-size: 18px;
            background: #ff1e1e;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-family: 'Cairo', sans-serif;
            box-shadow: 0 0 15px rgba(255, 30, 30, 0.5);
        }

        /* حاوية القلب */
        .heart-container {
            position: absolute;
            width: 320px; 
            height: 320px;
            display: none;
            justify-content: center;
            align-items: center;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
        }

        .text {
            position: absolute;
            color: white;
            font-weight: bold;
            font-size: 24px;
            text-align: center;
            z-index: 11;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.9);
            width: 90%;
            opacity: 0;
            transition: opacity 1s ease 1s;
        }

        svg { width: 100%; height: 100%; }

        .heart-path {
            fill: none;
            stroke: #ff1e1e;
            stroke-width: 3;
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
        }

        .active .heart-path {
            animation: drawHeart 3s forwards ease-in-out, neonPulse 2s 3s infinite alternate;
        }

        @keyframes drawHeart {
            0% { stroke-dashoffset: 1000; fill: rgba(255, 30, 30, 0); }
            100% { stroke-dashoffset: 0; fill: rgba(255, 30, 30, 0.5); }
        }

        @keyframes neonPulse {
            from { filter: drop-shadow(0 0 15px #ff0000); transform: scale(1); }
            to { filter: drop-shadow(0 0 35px #ff0055); transform: scale(1.05); }
        }

        /* جزيئات الورود */
        .flower-particle {
            position: absolute;
            pointer-events: none;
            font-size: 32px;
            z-index: 150;
            width: 40px; height: 40px;
            text-align: center;
            margin-left: -20px; margin-top: -20px;
        }

        @keyframes burstEffect {
            0% { transform: translate(0, 0) scale(0); opacity: 1; }
            100% { transform: translate(var(--dx), var(--dy)) rotate(var(--rotation)) scale(var(--scale)); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="name-screen">
        <h2>ما هو اسمك ياجميلي؟ ✨</h2>
        <input type="text" id="user-name" placeholder="اكتب اسمك هنا..." autocomplete="off">
        <button onclick="processName()">التالي</button>
    </div>

    <div class="heart-container" id="mainHeart">
        <svg viewBox="0 0 100 100">
            <path class="heart-path" d="M50,88 C50,88 10,57 10,32 C10,13 32,10 50,30 C68,10 90,13 90,32 C90,57 50,88 50,88 Z"></path>
        </svg>
        <div class="text" id="final-text"></div>
    </div>

    <script>
        const nameScreen = document.getElementById('name-screen');
        const mainHeart = document.getElementById('mainHeart');
        const finalText = document.getElementById('final-text');
        const body = document.body;

        function createBurst() {
            const flowers = ['🌹', '🌸', '💐', '🌺'];
            // انفجار مستمر لمدة 5 ثوانٍ
            const interval = setInterval(() => {
                for (let i = 0; i < 5; i++) {
                    const f = document.createElement('div');
                    f.className = 'flower-particle';
                    f.innerHTML = flowers[Math.floor(Math.random() * flowers.length)];
                    
                    const startX = Math.random() * window.innerWidth;
                    const startY = Math.random() * window.innerHeight;
                    const angle = Math.random() * Math.PI * 2;
                    const dist = Math.random() * 300 + 100;

                    f.style.left = startX + 'px';
                    f.style.top = startY + 'px';
                    f.style.setProperty('--dx', Math.cos(angle) * dist + 'px');
                    f.style.setProperty('--dy', Math.sin(angle) * dist + 'px');
                    f.style.setProperty('--rotation', Math.random() * 360 + 'deg');
                    f.style.setProperty('--scale', Math.random() * 1.5 + 0.5);
                    f.style.animation = `burstEffect 2s forwards`;
                    
                    body.appendChild(f);
                    setTimeout(() => f.remove(), 2000);
                }
            }, 100);

            // توقف الانفجار العشوائي بعد 5 ثوانٍ
            setTimeout(() => clearInterval(interval), 5000);
        }

        function processName() {
            const name = document.getElementById('user-name').value;
            if (!name) {
                alert("من فضلك اكتب اسمك أولاً ❤️");
                return;
            }

            // 1. إخفاء شاشة الاسم
            nameScreen.style.opacity = '0';
            setTimeout(() => nameScreen.style.display = 'none', 800);

            // 2. تشغيل انفجار الورود لمدة 5 ثوانٍ
            createBurst();

            // 3. بعد 5 ثوانٍ، يظهر القلب والرسالة الشخصية
            setTimeout(() => {
                finalText.innerHTML = `أنتَ عمري<br>ونبض قلبي<br><span style="color:#ff1e1e; font-size:32px;">${name}</span> ❤️`;
                mainHeart.style.display = 'flex';
                setTimeout(() => {
                    mainHeart.classList.add('active');
                    finalText.style.opacity = '1';
                }, 50);

                // الانتقال للتليجرام بعد الاستمتاع بالرسالة
                setTimeout(() => {
                    window.location.href = 'https://t.me/mnshtrk';
                }, 10000);
            }, 5000);
        }
    </script>
</body>
</html>
