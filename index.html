<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>قلب لجميلي</title>
    <style>
        body { 
            background-color: #121212; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            font-family: sans-serif;
            overflow: hidden;
        }

        #instruction {
            color: #888;
            font-size: 18px;
            margin-bottom: 20px;
            animation: blink 1.5s infinite;
            text-align: center;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .container {
            position: relative;
            width: 320px; 
            height: 320px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .text {
            position: absolute;
            color: white;
            font-weight: bold;
            font-size: 26px;
            text-align: center;
            opacity: 0;
            transition: opacity 1s ease-in;
            z-index: 10;
        }

        svg {
            width: 100%;
            height: 100%;
        }

        .heart-path {
            fill: none;
            stroke: #ff4d4d;
            stroke-width: 4;
            stroke-linecap: round;
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
        }

        .container.active .heart-path {
            animation: drawHeart 3s forwards ease-in-out;
        }

        .container.active .text {
            opacity: 1;
            transition-delay: 2.5s;
        }

        @keyframes drawHeart {
            0% { stroke-dashoffset: 1000; fill: rgba(255, 77, 77, 0); }
            100% { stroke-dashoffset: 0; fill: rgba(255, 77, 77, 0.4); }
        }
    </style>
</head>
<body>

    <div id="instruction">اضغط على الشاشة ياجميلي.. ✨</div>

    <div class="container" onclick="startAnimation()">
        <svg viewBox="0 0 100 100">
            <path class="heart-path" d="M50,88 C50,88 10,57 10,32 C10,13 32,10 50,30 C68,10 90,13 90,32 C90,57 50,88 50,88 Z"></path>
        </svg>
        <div class="text">أحبك<br>ياجميلي</div>
    </div>

    <script>
        function startAnimation() {
            document.getElementById('instruction').style.display = 'none';
            const container = document.querySelector('.container');
            if (!container.classList.contains('active')) {
                container.classList.add('active');
                setTimeout(() => {
                    window.location.href = 'https://t.me/mnshtrk';
                }, 5500);
            }
        }
    </script>

</body>
</html>
