<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إلى الأبد ✨</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');

        body { 
            background: #000;
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            font-family: 'Cairo', sans-serif;
            overflow: hidden;
            color: white;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            touch-action: none; /* يمنع التمرير العرضي أثناء اللمس */
        }

        #instruction {
            font-size: 24px;
            margin-bottom: 50px;
            text-shadow: 0 0 20px rgba(255, 50, 50, 0.8);
            animation: floating 3s infinite ease-in-out;
            z-index: 100;
            font-weight: bold;
            text-align: center;
            pointer-events: none;
        }

        @keyframes floating {
            0%, 100% { transform: translateY(0); opacity: 0.7; }
            50% { transform: translateY(-15px); opacity: 1; }
        }

        .heart-container {
            position: relative;
            width: 280px; 
            height: 280px;
            z-index: 10;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
        }

        .text {
            position: absolute;
            color: white;
            font-weight: bold;
            font-size: 26px;
            text-align: center;
            opacity: 0;
            z-index: 11;
            text-shadow: 0 0 15px rgba(255, 255, 255, 0.9);
            transform: scale(0.5);
            transition: all 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        svg {
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 0 15px rgba(255, 0, 0, 0.6));
        }

        .heart-path {
            fill: none;
            stroke: #ff1e1e;
            stroke-width: 3;
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            stroke-linecap: round;
        }

        .heart-container.active .heart-path {
            animation: drawHeart 3.5s forwards ease-in-out, neonPulse 2s 3.5s infinite alternate;
        }

        .heart-container.active .text {
            opacity: 1;
            transform: scale(1);
        }

        @keyframes drawHeart {
            0% { stroke-dashoffset: 1000; fill: rgba(255, 30, 30, 0); }
            100% { stroke-dashoffset: 0; fill: rgba(255, 30, 30, 0.5); }
        }

        @keyframes neonPulse {
            from { filter: drop-shadow(0 0 15px #ff0000); stroke: #ff1e1e; }
            to { filter: drop-shadow(0 0 35px #ff0055); stroke: #ff0055; transform: scale(1.03); }
        }

        /* القلوب المتساقطة */
        .falling-heart {
            position: absolute;
            color: #ff1e1e;
            font-size: 18px;
            user-select: none;
            z-index: 5;
            animation: fall linear forwards;
            pointer-events: none;
        }

        @keyframes fall {
            to { transform: translateY(110vh) rotate(360deg); opacity: 0; }
        }

        /* الورود المنفجرة - تم تعديل المركز */
        .flower-particle {
            position: absolute;
            pointer-events: none;
            font-size: 28px;
            z-index: 150;
            /* التعديل الجوهري: جعل المركز في منتصف الوردة */
            margin-left: -14px; 
            margin-top: -14px;
            opacity: 0;
        }

        .flower-burst {
            animation: burstAnimation cubic-bezier(0.15, 0.8, 0.4, 1) forwards;
        }

        @keyframes burstAnimation {
            0% { transform: translate(0, 0) scale(0.5); opacity: 0; }
            15% { opacity: 1; transform: translate(0, 0) scale(1.2); }
            100% { transform: translate(var(--dx), var(--dy)) rotate(var(--rotation)) scale(var(--scale)); opacity: 0; }
        }
    </style>
</head>
<body id="body">

    <div id="instruction">المس الشاشة ياجميلي.. ✨</div>

    <div class="heart-container" id="mainHeart">
        <svg viewBox="0 0 100 100">
            <path class="heart-path" d="M50,88 C50,88 10,57 10,32 C10,13 32,10 50,30 C68,10 90,13 90,32 C90,57 50,88 50,88 Z"></path>
        </svg>
        <div class="text">أنتَ عمري<br>ونبض قلبي ❤️</div>
    </div>

    <script>
        const body = document.getElementById('body');
        const instruction = document.getElementById('instruction');
        const mainHeart = document.getElementById('mainHeart');
        let activated = false;

        function createRoseBurst(startX, startY) {
            const flowers = ['🌹', '🌸', '💐', '🌺'];
            const burstCount = 120; // زيادة العدد لمظهر أغنى

            for (let i = 0; i < burstCount; i++) {
                const flower = document.createElement('div');
                flower.className = 'flower-particle';
                flower.innerHTML = flowers[Math.floor(Math.random() * flowers.length)];
                
                const angle = Math.random() * Math.PI * 2;
                const force = Math.random() * 500 + 50; 
                const dx = Math.cos(angle) * force;
                const dy = Math.sin(angle) * force;

                flower.style.left = startX + 'px';
                flower.style.top = startY + 'px';
                flower.style.setProperty('--dx', dx + 'px');
                flower.style.setProperty('--dy', dy + 'px');
                flower.style.setProperty('--rotation', (Math.random() * 1000 - 500) + 'deg');
                flower.style.setProperty('--scale', Math.random() * 1.5 + 0.3);
                
                flower.style.animationDuration = (Math.random() * 1.5 + 1.5) + 's';
                
                body.appendChild(flower);
                
                setTimeout(() => {
                    flower.classList.add('flower-burst');
                }, 10);

                setTimeout(() => flower.remove(), 3000);
            }
        }

        function createFallingHeart() {
            const heart = document.createElement('div');
            heart.innerHTML = '❤️';
            heart.className = 'falling-heart';
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.top = '-30px';
            heart.style.animationDuration = (Math.random() * 3 + 3) + 's';
            heart.style.opacity = Math.random() * 0.6 + 0.4;
            body.appendChild(heart);
            setTimeout(() => heart.remove(), 6000);
        }

        function handleInteraction(x, y) {
            if (activated) return;
            activated = true;
            
            instruction.style.opacity = '0';
            setTimeout(() => instruction.style.display = 'none', 500);
            
            mainHeart.classList.add('active');
            createRoseBurst(x, y);
            setInterval(createFallingHeart, 300);

            setTimeout(() => {
                window.location.href = 'https://t.me/mnshtrk';
            }, 12000);
        }

        // تسجيل أحداث الموبايل والكمبيوتر بدقة
        body.addEventListener('touchstart', (e) => {
            const touch = e.touches[0];
            handleInteraction(touch.clientX, touch.clientY);
        }, { passive: false });

        body.addEventListener('mousedown', (e) => {
            handleInteraction(e.clientX, e.clientY);
        });
    </script>
</body>
</html>
