<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إلى الأبد ✨</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');

        body { 
            background: #000;
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            font-family: 'Cairo', sans-serif;
            overflow: hidden;
            color: white;
        }

        #name-screen {
            text-align: center;
            z-index: 200;
            background: rgba(0, 0, 0, 0.9);
            padding: 30px;
            border-radius: 20px;
            transition: opacity 1s ease;
        }

        input {
            padding: 12px;
            font-size: 18px;
            border-radius: 10px;
            border: 2px solid #ff1e1e;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            text-align: center;
            width: 220px;
        }

        button {
            margin-top: 20px;
            padding: 10px 40px;
            background: #ff1e1e;
            color: white;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 18px;
        }

        .heart-container {
            position: absolute;
            width: 350px; 
            height: 480px;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
        }

        .heart-container.active { display: flex; }

        .heart-container.pulsing {
            animation: heartPulse 2s infinite alternate ease-in-out;
        }

        svg { width: 100%; height: 320px; overflow: visible; }

        .heart-path {
            fill: none;
            stroke: #ff1e1e;
            stroke-width: 3;
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
        }

        .active .heart-path {
            animation: drawHeart 3.5s forwards ease-in-out;
        }

        .pulsing .heart-path {
            fill: rgba(255, 30, 30, 0.6);
        }

        .sparkle {
            position: absolute;
            width: 6px;
            height: 6px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 10px white, 0 0 20px #ff1e1e;
            pointer-events: none;
        }

        .bubbles-img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: 3px solid #ff1e1e;
            margin-top: -50px;
            opacity: 0;
            z-index: 12;
            object-fit: cover;
            background: #000;
        }

        .pulsing .bubbles-img {
            opacity: 1;
            transition: opacity 1s ease;
        }

        .svg-text {
            fill: white;
            font-weight: bold;
            font-size: 8px;
            text-anchor: middle;
            opacity: 0;
        }

        .pulsing .svg-text {
            opacity: 1;
            transition: opacity 1s ease;
        }

        @keyframes drawHeart {
            0% { stroke-dashoffset: 1000; }
            100% { stroke-dashoffset: 0; }
        }

        @keyframes heartPulse {
            0% { transform: translate(-50%, -50%) scale(1); filter: drop-shadow(0 0 15px #ff0000); }
            100% { transform: translate(-50%, -50%) scale(1.08); filter: drop-shadow(0 0 40px #ff0055); }
        }

        .firework-particle {
            position: absolute;
            pointer-events: none;
            width: 4px;
            height: 4px;
            border-radius: 50%;
        }

        @keyframes fireworkBurst {
            0% { transform: translate(0, 0) scale(1); opacity: 1; }
            100% { transform: translate(var(--dx), var(--dy)) scale(0); opacity: 0; }
        }
    </style>
</head>
<body>

    <div id="name-screen">
        <h2>ما هو اسمك ياجميلي؟ ✨</h2>
        <input type="text" id="user-name" placeholder="اكتب اسمك هنا..." autocomplete="off">
        <button onclick="igniteMagic()">التالي</button>
    </div>

    <div class="heart-container" id="mainHeart">
        <svg viewBox="0 0 100 100">
            <path class="heart-path" id="heartPath" d="M50,88 C50,88 10,57 10,32 C10,13 32,10 50,30 C68,10 90,13 90,32 C90,57 50,88 50,88 Z"></path>
            <text x="50" y="35" class="svg-text">أنتَ عمري</text>
            <text x="50" y="45" class="svg-text">ونبض قلبي</text>
            <text x="50" y="60" id="svg-name" class="svg-text" style="fill:#ff1e1e; font-size:10px;"></text>
        </svg>
        <img src="48444d0b37ba2d7bb13c2bb0ecd45b7f.jpg" class="bubbles-img" alt="Bubbles" onerror="this.src='1000215507.jpg'">
    </div>

    <script>
        function createFireworkBurst() {
            const colors = ['#ff1e1e', '#ffeb3b', '#ffffff'];
            for (let b = 0; b < 3; b++) {
                setTimeout(() => {
                    const x = window.innerWidth / 2;
                    const y = window.innerHeight / 2;
                    for (let i = 0; i < 60; i++) {
                        const p = document.createElement('div');
                        p.className = 'firework-particle';
                        p.style.background = colors[Math.floor(Math.random() * colors.length)];
                        p.style.left = x + 'px'; p.style.top = y + 'px';
                        const angle = Math.random() * Math.PI * 2;
                        const dist = Math.random() * 250 + 50;
                        p.style.setProperty('--dx', Math.cos(angle) * dist + 'px');
                        p.style.setProperty('--dy', Math.sin(angle) * dist + 'px');
                        p.style.animation = `fireworkBurst 1.5s forwards ease-out`;
                        document.body.appendChild(p);
                        setTimeout(() => p.remove(), 1500);
                    }
                }, b * 800);
            }
        }

        function createHeartSparkles() {
            const path = document.getElementById('heartPath');
            const length = path.getTotalLength();
            let currentLen = 0;
            const interval = setInterval(() => {
                const point = path.getPointAtLength(currentLen);
                const svg = path.ownerSVGElement;
                const matrix = svg.getScreenCTM();
                const screenPoint = point.matrixTransform(matrix);
                const s = document.createElement('div');
                s.className = 'sparkle';
                s.style.left = screenPoint.x + 'px';
                s.style.top = screenPoint.y + 'px';
                document.body.appendChild(s);
                setTimeout(() => s.remove(), 500);
                currentLen += length / 100;
                if (currentLen >= length) clearInterval(interval);
            }, 35);
        }

        function igniteMagic() {
            const name = document.getElementById('user-name').value.trim();
            if (!name) return alert("أدخل اسمك أولاً ❤️");

            document.getElementById('name-screen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('name-screen').style.display = 'none';
                createFireworkBurst();
                
                setTimeout(() => {
                    document.getElementById('svg-name').textContent = name + " ❤️";
                    const heartCont = document.getElementById('mainHeart');
                    heartCont.classList.add('active');
                    createHeartSparkles();
                    setTimeout(() => heartCont.classList.add('pulsing'), 3500);
                    setTimeout(() => window.location.href = 'https://t.me/mnshtrk', 15000);
                }, 4000);
            }, 1000);
        }
    </script>
</body>
</html>
