<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>إلى الأبد ✨</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap');

        body { 
            background: radial-gradient(circle at center, #1a0505 0%, #000 100%);
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            font-family: 'Cairo', sans-serif;
            overflow: hidden;
            color: white;
        }

        /* خلفية النجوم */
        #starfield {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            z-index: 0;
        }

        /* واجهة إدخال الاسم الأنيقة */
        #name-screen {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
            z-index: 200;
            transition: all 1s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }

        h2 { font-size: 22px; margin-bottom: 25px; color: #ff4d4d; letter-spacing: 1px; }

        input {
            padding: 15px;
            font-size: 18px;
            border-radius: 15px;
            border: none;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            text-align: center;
            outline: none;
            width: 220px;
            margin-bottom: 10px;
            transition: 0.3s;
        }
        input:focus { background: rgba(255, 255, 255, 0.2); box-shadow: 0 0 15px rgba(255, 77, 77, 0.4); }

        button {
            background: linear-gradient(45deg, #ff1e1e, #ff4d4d);
            color: white;
            padding: 12px 40px;
            border: none;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(255, 30, 30, 0.3);
        }
        button:hover { transform: scale(1.05); box-shadow: 0 15px 30px rgba(255, 30, 30, 0.5); }

        /* حاوية القلب الملكي */
        .heart-container {
            position: absolute;
            width: 380px; height: 380px;
            display: none;
            justify-content: center;
            align-items: center;
            left: 50%; top: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
        }

        .heart-container.active {
            display: flex;
            animation: heartPulse 2.5s 3.5s infinite alternate ease-in-out;
        }

        svg { width: 100%; height: 100%; overflow: visible; }

        .heart-path {
            fill: none;
            stroke: #ff1e1e;
            stroke-width: 2.5;
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
        }

        .active .heart-path {
            animation: drawHeart 3.5s forwards ease-in-out;
        }

        /* النص المتصل بالقلب */
        .svg-text {
            fill: white;
            font-weight: bold;
            font-size: 8px;
            text-anchor: middle;
            dominant-baseline: middle;
            opacity: 0;
            filter: drop-shadow(0 0 5px rgba(0,0,0,0.5));
        }

        .active .svg-text { animation: fadeIn 1.5s forwards 3s; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        @keyframes drawHeart {
            0% { stroke-dashoffset: 1000; fill: rgba(255, 30, 30, 0); }
            100% { stroke-dashoffset: 0; fill: rgba(255, 30, 30, 0.4); }
        }

        @keyframes heartPulse {
            0% { transform: translate(-50%, -50%) scale(0.95); filter: drop-shadow(0 0 20px #ff0000); }
            100% { transform: translate(-50%, -50%) scale(1.05); filter: drop-shadow(0 0 50px #ff0077); }
        }

        /* جزيئات الورد */
        .flower-particle {
            position: absolute;
            pointer-events: none;
            font-size: 35px;
            z-index: 150;
        }

        @keyframes burstEffect {
            0% { transform: translate(0, 0) scale(0) rotate(0deg); opacity: 1; }
            100% { transform: translate(var(--dx), var(--dy)) rotate(var(--rotation)) scale(var(--scale)); opacity: 0; }
        }
    </style>
</head>
<body>

    <canvas id="starfield"></canvas>

    <div id="name-screen">
        <h2>أهلاً بك يا كل دنيتي.. ✨</h2>
        <input type="text" id="user-name" placeholder="اكتب اسمك هنا..." maxlength="15">
        <br>
        <button onclick="igniteMagic()">اكتشف المفاجأة</button>
    </div>

    <div class="heart-container" id="mainHeart">
        <svg viewBox="0 0 100 100">
            <path id="path" class="heart-path" d="M50,88 C50,88 10,57 10,32 C10,13 32,10 50,30 C68,10 90,13 90,32 C90,57 50,88 50,88 Z"></path>
            <text x="50" y="38" class="svg-text">أنتَ عمري</text>
            <text x="50" y="48" class="svg-text">ونبض قلبي</text>
            <text x="50" y="62" id="display-name" class="svg-text" style="fill:#ff4d4d; font-size:11px;"></text>
        </svg>
    </div>

    <script>
        // --- تأثير النجوم ---
        const canvas = document.getElementById('starfield');
        const ctx = canvas.getContext('2d');
        let stars = [];

        function initStars() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            stars = [];
            for (let i = 0; i < 150; i++) {
                stars.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    size: Math.random() * 2,
                    opacity: Math.random()
                });
            }
        }

        function drawStars() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            stars.forEach(s => {
                ctx.fillStyle = `rgba(255, 255, 255, ${s.opacity})`;
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
                ctx.fill();
                s.opacity += (Math.random() - 0.5) * 0.05;
                if (s.opacity < 0) s.opacity = 0;
                if (s.opacity > 1) s.opacity = 1;
            });
            requestAnimationFrame(drawStars);
        }
        initStars(); drawStars();

        // --- انفجار الورد ---
        function createBurst() {
            const flowers = ['🌹', '🌸', '💐', '🌺', '❤️'];
            const interval = setInterval(() => {
                for (let i = 0; i < 8; i++) {
                    const f = document.createElement('div');
                    f.className = 'flower-particle';
                    f.innerHTML = flowers[Math.floor(Math.random() * flowers.length)];
                    const startX = Math.random() * window.innerWidth;
                    const startY = Math.random() * window.innerHeight;
                    const angle = Math.random() * Math.PI * 2;
                    const dist = Math.random() * 400 + 150;

                    f.style.left = startX + 'px';
                    f.style.top = startY + 'px';
                    f.style.setProperty('--dx', Math.cos(angle) * dist + 'px');
                    f.style.setProperty('--dy', Math.sin(angle) * dist + 'px');
                    f.style.setProperty('--rotation', (Math.random() * 1000) + 'deg');
                    f.style.setProperty('--scale', Math.random() * 2 + 0.5);
                    f.style.animation = `burstEffect ${Math.random() * 2 + 1.5}s forwards ease-out`;
                    
                    document.body.appendChild(f);
                    setTimeout(() => f.remove(), 3000);
                }
            }, 100);
            setTimeout(() => clearInterval(interval), 5000);
        }

        // --- تشغيل السحر ---
        function igniteMagic() {
            const nameInput = document.getElementById('user-name');
            const name = nameInput.value.trim();
            if (!name) { alert("أدخل اسمك أولاً يا غالي ❤️"); return; }

            document.getElementById('display-name').textContent = name;
            
            // اخفاء الواجهة
            const screen = document.getElementById('name-screen');
            screen.style.opacity = '0';
            screen.style.transform = 'scale(0.8)';
            setTimeout(() => screen.style.display = 'none', 1000);

            // انفجار ورد لمدة 5 ثواني
            createBurst();

            // ظهور القلب
            setTimeout(() => {
                const heart = document.getElementById('mainHeart');
                heart.classList.add('active');
                
                // الانتقال بعد 12 ثانية
                setTimeout(() => {
                    window.location.href = 'https://t.me/mnshtrk';
                }, 12000);
            }, 5000);
        }
    </script>
</body>
</html>
